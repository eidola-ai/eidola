# Override: add TCP listener on the internal endpoint for container-to-container
# and host-side dev access. The upstream default only binds Unix sockets.

[default]
workers = 8
max_blocking = 64
ident = "dstack Simulator"
temp_dir = "/tmp"
keep_alive = 10
log_level = "debug"

[default.core]
keys_file = "appkeys.json"
compose_file = "app-compose.json"
sys_config_file = "sys-config.json"

[default.core.simulator]
enabled = true
attestation_file = "attestation.bin"

[internal-v0]
address = "unix:./tappd.sock"
reuse = true

# The internal endpoint serves the dstack RPC API (GetKey, GetQuote, etc.).
# Bind to TCP so other containers and the host can reach it.
[internal]
address = "0.0.0.0:8090"
reuse = true

[external]
address = "unix:./external.sock"
reuse = true

[guest-api]
address = "unix:./guest.sock"
reuse = true
