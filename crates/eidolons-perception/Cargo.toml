[package]
name = "eidolons-perception"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true

[dependencies]
burn = { version = "0.20", features = ["cubecl", "fusion", "autodiff"] }
burn-cubecl = "0.20"
burn-wgpu = { version = "0.20", features = ["metal"] }
burn-ndarray = "0.20"
tokio = { version = "1", features = ["full"] }
anyhow = "1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "macros"] }
