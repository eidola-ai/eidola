# See https://rust-lang.github.io/rustup/overrides.html for details on how this file works
# and how you can override the choices made herein.
#
# Note that UniFFI also sets their own toolchain (see https://github.com/mozilla/uniffi-rs/blob/main/rust-toolchain.toml).
# We will attempt to track stable unless we find that this breaks something.

[toolchain]
channel = "1.93.0"
targets = [
    # macOS
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",

    # TODO: iOS
    # "aarch64-apple-ios",
    # "aarch64-apple-ios-sim",
    # "x86_64-apple-ios",

    # TODO: Android
    # "armv7-linux-androideabi",
    # "i686-linux-android",
    # "aarch64-linux-android",
    # "x86_64-linux-android",
    # "x86_64-unknown-linux-gnu",
    # "x86_64-apple-darwin",
    # "aarch64-apple-darwin",
    # "x86_64-pc-windows-gnu",
    # "x86_64-pc-windows-msvc",

    # TODO: WebAssembly
    # "wasm32-unknown-unknown",

    # Linux (musl for static linking)
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",

    # Linux (gnu for cross-compilation from macOS)
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",

]
components = ["clippy", "rustfmt"]
