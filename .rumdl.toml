# Configuration for rumdl — the markdown linter. The upstream binary is
# pinned via the `crates/rumdl/` anchor crate (package `rumdl-pinned`)
# and run by `just check` and CI as `cargo build -p rumdl && rumdl check`.
#
# rule reference: https://rumdl.dev/

[global]
# Rules disabled for project style:
#
#   MD041 — first line in file should be a level-1 heading. Several files
#           (CLAUDE.md, GEMINI.md, crates/eidola-gui/CLAUDE.md) are
#           intentional one-line stubs that just say `@AGENTS.md`.
#   MD038 — spaces inside code spans. This codebase documents CLI output
#           and editor glyphs where the trailing space inside a span
#           (e.g. `thinking: `, `• `, `1. `) is the semantic content
#           being shown literally. MD038 strips those spaces.
disable = ["MD041", "MD038"]

# Files we never touch:
#
#   CLA-*.md
#       Legal text whose SHA-256 hashes are recorded in CLA-SIGNERS.txt.
#       Reformatting them changes the hash and invalidates every signer
#       entry. See cla.yml.
exclude = [
    "CLA-INDIVIDUAL.md",
    "CLA-CORPORATE.md",
]

# .gitignore covers target/, result*, .dev-certs/, etc.
respect_gitignore = true

# Lists use `-` markers throughout the repo.
[MD004]
style = "dash"

# ATX headings (`# Heading`), not setext (`Heading\n=====`).
[MD003]
style = "atx"

# One paragraph per source line — collapse soft line breaks, preserve
# paragraph breaks. We let editors soft-wrap visually so the source has
# no hard wrap to maintain when prose is edited. Mechanism: rumdl's
# `normalize` reflow repacks paragraphs to fit `line_length`; setting it
# absurdly high (the upstream test case for this exact use case —
# `test_issue_76_use_case` in rumdl 0.2.6) means every paragraph fits
# on one line, so all internal soft breaks are removed. Code blocks
# stay untouched (`code_block_line_length = 0` = unlimited).
[MD013]
line_length = 999999
code_block_line_length = 0
reflow = true
reflow_mode = "normalize"
