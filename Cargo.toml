[workspace]

members = [
    "apps/cli",
    "crates/*",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Mike Marcacci"]
repository = "https://github.com/eidola-ai/eidola"
publish = false

# Override sev crate with crypto_nossl measurement support (snp_calc_launch_digest).
# Switch to crates.io once https://github.com/virtee/sev merges the upstream PR.
[patch.crates-io]
sev = { git = "https://github.com/eidola-ai/sev", rev = "fdd2fcd36cdb996fbcae766a1a22025a4c96faa3" }

[profile.docker-dev]
inherits = "dev"
opt-level = 1

[profile.release]
# Incremental compilation is disabled to avoid non-determinism.
incremental = false
# Codegen units are set to 1 to avoid potential non-determinism.
codegen-units = 1
# Explicit thin link-time optimization
lto = "thin"
# Explicit optimization level
opt-level = 3
# Strip symbols for determinism
strip = true
# Explicit overflow check setting
overflow-checks = false
