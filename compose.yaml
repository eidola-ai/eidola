services:
  postgres:
    image: eidolons-postgres:dev
    build:
      context: .
      dockerfile: docker/postgresql/Containerfile
    environment:
      POSTGRES_USER: eidolons
      POSTGRES_DB: eidolons
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./crates/eidolons-server/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "eidolons"]
      interval: 5s
      retries: 5

  server:
    image: eidolons-server:dev
    build:
      context: .
      dockerfile: crates/eidolons-server/Containerfile
    environment:
      DATABASE_URL: postgres://eidolons@postgres/eidolons
      TINFOIL_API_KEY: ${TINFOIL_API_KEY}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  shim:
    image: dev-shim:dev
    build:
      context: .
      dockerfile: tools/dev-shim/Containerfile
    environment:
      UPSTREAM_URL: http://server:8080
      LISTEN_ADDR: 0.0.0.0:8443
      CERT_DIR: /src/.dev-certs
    ports:
      - "8443:8443"
    volumes:
      - .dev-certs:/src/.dev-certs
    depends_on:
      server:
        condition: service_started

  stripe-cli:
    image: stripe-cli:dev
    build:
      context: .
      dockerfile: docker/stripe-cli/Containerfile
    profiles: ["test"]
    environment:
      STRIPE_API_KEY: ${STRIPE_API_KEY}
    command: ["listen", "--forward-to", "https://shim:8443/v1/webhooks/stripe", "--skip-verify"]

volumes:
  pgdata:
