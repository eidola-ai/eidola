services:
  simulator:
    image: dstack-simulator:dev
    build:
      context: .
      dockerfile: docker/simulator/Containerfile
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "-w", "", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{}", "http://localhost:8090/GetKey"]
      interval: 2s
      retries: 15
      start_period: 5s

  postgres:
    image: eidolons-postgres:dev
    build:
      context: .
      dockerfile: docker/postgresql/Containerfile
    environment:
      POSTGRES_USER: eidolons
      POSTGRES_DB: eidolons
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./crates/eidolons-server/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "eidolons"]
      interval: 5s
      retries: 5

  server:
    image: eidolons-server:dev
    build:
      context: .
      dockerfile: crates/eidolons-server/Containerfile
    environment:
      DATABASE_URL: postgres://eidolons@postgres/eidolons
      REDPILL_API_KEY: ${REDPILL_API_KEY}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BIND_ADDR: 0.0.0.0:8080
      DSTACK_SIMULATOR_ENDPOINT: http://simulator:8090
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      simulator:
        condition: service_healthy

  stripe-cli:
    image: stripe-cli:dev
    build:
      context: .
      dockerfile: docker/stripe-cli/Containerfile
    profiles: ["test"]
    environment:
      STRIPE_API_KEY: ${STRIPE_API_KEY}
    command: ["listen", "--forward-to", "http://server:8080/v1/webhooks/stripe"]

volumes:
  pgdata:
