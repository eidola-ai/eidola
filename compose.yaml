services:
  postgres:
    image: eidola-postgres:dev
    platform: linux/amd64
    build:
      context: .
      dockerfile: oci/postgresql/Containerfile
    environment:
      POSTGRES_USER: eidola
      POSTGRES_DB: eidola
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./crates/eidola-server/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "eidola"]
      interval: 5s
      retries: 5

  server:
    image: eidola-server:dev
    platform: linux/amd64
    build:
      context: .
      dockerfile: oci/eidola-server/Containerfile
    environment:
      DATABASE_URL: postgres://eidola@postgres/eidola?options=-csearch_path%3Deidola
      TINFOIL_API_KEY: ${TINFOIL_API_KEY}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    profiles: ["server"]
    depends_on:
      postgres:
        condition: service_healthy

  shim:
    image: tinfoil-shim-mock:dev
    platform: linux/amd64
    build:
      context: .
      dockerfile: oci/tinfoil-shim-mock/Containerfile
    environment:
      # Default targets the in-compose `server` container. Override with
      # `SHIM_UPSTREAM_URL=http://host.docker.internal:8080` to forward to a
      # cargo-built server running on the host (see `just services`).
      UPSTREAM_URL: ${SHIM_UPSTREAM_URL:-http://server:8080}
      LISTEN_ADDR: 0.0.0.0:8443
      CERT_DIR: /src/.dev-certs
    ports:
      - "8443:8443"
    volumes:
      - .dev-certs:/src/.dev-certs
    extra_hosts:
      # Make `host.docker.internal` resolve to the host on Linux too. This is
      # already a no-op on Docker Desktop (mac/Windows) where the alias exists
      # automatically.
      - "host.docker.internal:host-gateway"

  stripe-cli:
    image: stripe-cli:dev
    build:
      context: .
      dockerfile: oci/stripe-cli/Containerfile
    profiles: ["stripe"]
    environment:
      STRIPE_API_KEY: ${STRIPE_API_KEY}
    command:
      [
        "listen",
        "--forward-to",
        "https://shim:8443/v1/webhooks/stripe",
        "--skip-verify",
      ]

volumes:
  pgdata:
