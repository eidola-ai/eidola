version: 2
updates:
  # Maintain dependencies for GitHub Actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      "GitHub Actions (Minor/Patch)":
        update-types:
          - "minor"
          - "patch"

  # Maintain dependencies for Rust/Cargo.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      "Cargo Dependencies (Minor/Patch)":
        update-types:
          - "minor"
          - "patch"
