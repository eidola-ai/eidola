version: 2
updates:
  # All updates target `next`, not the default branch (`main`). Every change
  # must funnel through `next` — `main` only ever advances by fast-forward to a
  # verified `next` commit (see AGENTS.md "Branch flow"). A dependency bump
  # merged straight to `main` would put `main` ahead of `next` and break the
  # `main ⊆ next` invariant.

  # Maintain dependencies for GitHub Actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "next"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      "GitHub Actions (Minor/Patch)":
        update-types:
          - "minor"
          - "patch"

  # Maintain dependencies for Rust/Cargo.
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "next"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      "Cargo Dependencies (Minor/Patch)":
        update-types:
          - "minor"
          - "patch"

  # Maintain dependencies for Rust/Toolchain.
  - package-ecosystem: "rust-toolchain"
    directory: "/"
    target-branch: "next"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  # Maintain dependencies for Docker (Containerfiles).
  - package-ecosystem: "docker"
    directory: "/oci/eidola-server"
    target-branch: "next"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/oci/postgresql"
    target-branch: "next"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/oci/tinfoil-shim-mock"
    target-branch: "next"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/oci/stripe-cli"
    target-branch: "next"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
