name: Pin GitHub Actions

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pin GitHub Actions to SHAs
        uses: stacklok/frizbee-action@v0.0.12
        with:
          open_pr: true  # Automatically create PR with pinned actions
