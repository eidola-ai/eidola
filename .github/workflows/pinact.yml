name: Suggest pinning GitHub Actions

on:
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  suggest-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Suggest action pins
        uses: suzuki-shunsuke/pinact-action@d9621e70f24c0de8c039e01c2c96ea61e7b8a0fe # v0.2.2
