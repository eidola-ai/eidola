name: Suggest pinning GitHub Actions

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

# Cancel superseded runs when a PR branch is updated; only the latest commit's
# pin suggestions are useful.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level: no permissions by default; each job opts in to what it needs.
permissions: {}

jobs:
  suggest-pins:
    name: Suggest pinning GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # reviewdog posts pin suggestions as PR review comments
      contents: read # pinact reads workflow files and resolves action refs via the GitHub API
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Suggest action pins
        uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # v3.0.0
        with:
          fix: "false" # validate-only; implies skip_push:"true" (no files modified, nothing to commit)
          review: "true" # surface unpinned actions as reviewdog PR review comments
