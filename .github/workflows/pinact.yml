name: Suggest pinning GitHub Actions

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

permissions:
  contents: write
  pull-requests: write

jobs:
  suggest-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Suggest action pins
        uses: mike-marcacci/pinact-action@5c69d502ac7b8e09b2b16556155ebd4cbe1de663 # v1.0.0
        with:
          skip_push: true
