name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "next"]
  schedule:
    - cron: "26 17 * * 1"

# Cancel superseded PR runs; let push/schedule runs complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload CodeQL results to the GitHub Security tab
      packages: read # CodeQL fetches language packs and queries from GitHub Packages
      actions: read # CodeQL inspects workflow definitions for the actions language
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: actions
            language: actions
            build-mode: none
          - name: rust
            language: rust
            build-mode: none
            config-file: .github/codeql/codeql-config-rust.yml
          - name: rust-apps
            language: rust
            build-mode: none
            config-file: .github/codeql/codeql-config-rust-apps.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{matrix.name}}"
