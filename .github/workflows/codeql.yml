name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "26 17 * * 1"

# Cancel superseded PR runs; let push/schedule runs complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload CodeQL results to the GitHub Security tab
      packages: read # CodeQL fetches language packs and queries from GitHub Packages
      actions: read # CodeQL inspects workflow definitions for the actions language
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: actions
            language: actions
            build-mode: none
          - name: rust
            language: rust
            build-mode: none
            config-file: .github/codeql/codeql-config-rust.yml
          - name: rust-apps
            language: rust
            build-mode: none
            config-file: .github/codeql/codeql-config-rust-apps.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{matrix.name}}"
