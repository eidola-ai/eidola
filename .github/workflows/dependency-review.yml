name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - next

permissions:
  contents: read

jobs:
  dependency-review:
    name: License & vulnerability check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          # `LicenseRef-bad-mitapache-2.0` is the synthetic license the action
          # emits for crates declaring `MIT/Apache-2.0` (deprecated slash form)
          # that its SPDX parser can't parse — e.g. async-tar, rangemap,
          # filetime, ctrlc. The slug is derived from that exact string, so it
          # only ever matches "MIT OR Apache-2.0" crates; since both MIT and
          # Apache-2.0 are already allowed below, allowlisting the ref accepts
          # nothing we wouldn't otherwise. (If a future action bump changes the
          # slug, the check fails closed rather than silently allowing anything.)
          allow-licenses: >-
            0BSD,
            Apache-2.0,
            Apache-2.0 WITH LLVM-exception,
            BSD-1-Clause,
            BSD-2-Clause,
            BSD-3-Clause,
            BSL-1.0,
            bzip2-1.0.6,
            CC0-1.0,
            CDLA-Permissive-2.0,
            ISC,
            LicenseRef-bad-mitapache-2.0,
            MIT,
            MIT-0,
            MPL-2.0,
            NCSA,
            Unicode-3.0,
            Unlicense,
            Zlib
          # Per-package license exemptions. Unlike adding to `allow-licenses`,
          # these don't relax the policy for anything else — distributed Rust
          # crates stay strict — and vulnerability checks still apply. Listed
          # here are GitHub Actions: CI tooling we run but never distribute, so
          # a copyleft license creates no obligation. Versionless purls so they
          # survive SHA bumps.
          #   * Swatinem/rust-cache — LGPL-3.0. (Pre-existing dep; the workflow
          #     refactor is just the first PR to bring it into review scope.)
          allow-dependencies-licenses: >-
            pkg:githubactions/Swatinem/rust-cache
