name: Promote next to main

# Fast-forward `main` to the head of an approved, green `next` -> `main` pull
# request when a maintainer comments `/promote` on it.
#
# The promotion is a plain (non-force) ref update via the Git refs API, so
# GitHub itself rejects anything that isn't a fast-forward (HTTP 422). That
# guarantees:
#   * `main` only ever advances to a commit that already has `main` as an
#     ancestor — the `main ⊆ next` invariant is preserved by construction; and
#   * `main` lands on the *exact* `next` commit the `Build & Verify Artifacts` chain validated on this
#     PR (the PR head SHA), not a rewritten squash/rebase commit.
# After the push, the PR head is reachable from `main`, so GitHub marks the PR
# merged automatically.
#
# Integrity model (full setup in docs/contributing/promotion-security.md):
#   * Credentials are a dedicated GitHub App, not a PAT. Its App ID + private
#     key live as secrets on the `promote` Environment, whose deployment-branch
#     policy is restricted to `main` and which (recommended) requires a human
#     reviewer. Because this job declares `environment: promote`, and because an
#     `issue_comment` run executes the *default-branch* (`main`) copy of this
#     workflow with `github.ref = refs/heads/main`, only this trusted workflow
#     running from `main` can mint the token. A workflow on a feature/PR branch
#     cannot: its ref fails the branch policy, so the Environment secrets are
#     withheld — closing the "same-repo PR runs its own modified workflow with
#     secrets" hole. (Store the App secrets ONLY on the Environment, never as
#     repo/org secrets, or that protection is moot.)
#   * The App is the sole bypass actor on `main`'s ruleset (no PATs, no humans),
#     with minimal permissions: contents:write, pull-requests:write, checks:read.
#   * Who may trigger `/promote` is decided by the commenter's *repository*
#     permission (admin/write), queried via the collaborators API in a separate
#     `authorize` job that runs before the App token is minted — NOT by
#     `author_association`, which in an org only proves org membership, not write
#     access on this repo. This gate holds even if the Environment has no
#     required reviewer configured.
#   * The push is non-force, so GitHub still rejects a non-fast-forward; the App
#     can only ever advance `main` to a commit this job has verified.
on:
  issue_comment:
    types: [created]

concurrency:
  group: promote-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions: {}

jobs:
  # Authoritative authorization gate, independent of the Environment's (optional)
  # required reviewers: the commenter must hold repository write access. This
  # runs before the env-gated `promote` job, so an unauthorized commenter never
  # reaches the Environment or mints the App token.
  authorize:
    name: Authorize commenter
    # The `author_association` clause is only a cheap noise pre-filter (drops
    # drive-by outsiders). It is NOT the security gate — it would wrongly admit
    # an org MEMBER without repo write access. The collaborators-permission API
    # call in the step below is the authoritative check.
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/promote') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {} # collaborators/permission needs only the implicit metadata:read
    steps:
      - name: Require repository write access
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          # Roll-up permission is one of admin|write|read|none. Push-capable
          # roles (admin, maintain, write, and push-granting custom roles)
          # resolve to admin/write; triage and read do not.
          PERM=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission' 2>/dev/null || echo "none")
          echo "@$ACTOR repository permission: $PERM"
          case "$PERM" in
            admin|write) echo "✅ @$ACTOR may promote" ;;
            *) echo "::error::@$ACTOR lacks write access (permission: $PERM); only repo writers can /promote"; exit 1 ;;
          esac

  promote:
    name: Fast-forward main
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Gated by the `promote` Environment: main-only deployment-branch policy +
    # (recommended) required reviewers. This is what restricts the App
    # credentials to runs of this workflow from `main`.
    environment: promote
    permissions:
      contents: read # all writes use the minted App token below, not GITHUB_TOKEN
    steps:
      - name: Mint promotion App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PROMOTE_APP_ID }}
          private-key: ${{ secrets.PROMOTE_APP_PRIVATE_KEY }}
          # Least-privilege installation token; the App must be granted at least
          # these permissions on this repo (see the security runbook).
          permission-contents: write
          permission-pull-requests: write
          permission-checks: read

      - name: Validate and fast-forward
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail

          # Resolve PR state. headRefOid is the exact commit CI validated.
          eval "$(gh pr view "$PR" --repo "$REPO" \
            --json baseRefName,headRefName,headRefOid,state,reviewDecision,isCrossRepository \
            --jq '@sh "BASE=\(.baseRefName) HEAD=\(.headRefName) SHA=\(.headRefOid) STATE=\(.state) REVIEW=\(.reviewDecision) CROSS=\(.isCrossRepository)"')"

          echo "PR #$PR: $HEAD -> $BASE @ $SHA (state=$STATE review=$REVIEW cross=$CROSS), requested by @$ACTOR"

          [ "$STATE" = "OPEN" ]   || { echo "::error::PR is $STATE, not OPEN"; exit 1; }
          [ "$BASE" = "main" ]    || { echo "::error::base is '$BASE', expected 'main'"; exit 1; }
          [ "$HEAD" = "next" ]    || { echo "::error::head is '$HEAD', expected 'next'"; exit 1; }
          [ "$CROSS" = "false" ]  || { echo "::error::head is a fork branch, not this repo's 'next'"; exit 1; }

          # TODO: uncomment once reviewers exist and a review is required
          # [ "$REVIEW" = "APPROVED" ] || { echo "::error::review decision is '$REVIEW', expected APPROVED"; exit 1; }

          # All required checks (i.e. the CI chain) must be green. `gh pr checks`
          # exits 0 only when every required check has passed.
          gh pr checks "$PR" --repo "$REPO" --required \
            || { echo "::error::required checks are not all green"; exit 1; }

          # Fast-forward main. force=false => the API refuses a non-fast-forward.
          gh api -X PATCH "repos/$REPO/git/refs/heads/main" \
            -f sha="$SHA" -F force=false

          gh pr comment "$PR" --repo "$REPO" --body \
            "🚀 Fast-forwarded \`main\` to \`$SHA\` (validated on this PR) at @$ACTOR's request. \`main\` remains an ancestor of \`next\`."
