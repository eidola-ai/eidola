name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-all-platforms:
    name: Build all platforms
    # runs-on: macos-26 # Apple Silicon for native macOS + cross-compile to Linux
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@f9ebef276016dd519d188ee7b71879732418f8b9 # v3.16.0

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v8
        with:
          # Without a paid account, the action will perform an unnecessary check and issue a warning
          # unless this is set to false
          use-flakehub: false
          source-url: https://github.com/mike-marcacci/magic-nix-cache/releases/download/v0.0.1-skip-upstream-test/magic-nix-cache-closure-ARM64-macOS.xz

      - name: Show flake info
        run: nix flake show

      - name: Run all checks
        run: nix flake check --show-trace --max-jobs auto

      - name: Verify generated code is up to date
        run: |
          set -euo pipefail

          echo "=== Regenerating Swift bindings ==="
          nix run '.#update-eidolons-shared-swift-bindings'

          echo "=== Regenerating OpenAPI spec ==="
          nix run '.#update-server-openapi'

          echo "=== Checking for uncommitted changes ==="
          if ! git diff --quiet; then
            echo "::error::Generated code is out of date. Please run the following commands and commit the changes:"
            echo "::error::  nix run '.#update-eidolons-shared-swift-bindings'"
            echo "::error::  nix run '.#update-server-openapi'"
            echo ""
            echo "Diff of outdated files:"
            git diff --stat
            git diff
            exit 1
          fi

          echo "All generated code is up to date."

      - name: Build all packages
        run: |
          mkdir -p $RUNNER_TEMP/out

          # OCI images (Linux only)
          nix build '.#server-oci--x86_64-unknown-linux-musl' -L -o $RUNNER_TEMP/out/server-oci--x86_64-unknown-linux-musl.tar.gz
          nix build '.#server-oci--aarch64-unknown-linux-musl' -L -o $RUNNER_TEMP/out/server-oci--aarch64-unknown-linux-musl.tar.gz

          # Build the XCFramework via Nix and update the local path
          nix run '.#update-eidolons-shared-swift-xcframework'

          # Build native apps
          # Note that we *cannot* use nix until Swift 6 is available in nixpkgs
          ( cd apps/macos && Support/package-app.sh )

      - name: Verify build outputs
        run: |
          echo "=== Server OCI images ==="
          ls -lh $RUNNER_TEMP/out/server-oci--*

      - name: Run Swift tests
        run: |
          # Run Swift tests for shared core
          ( cd apps/eidolons-shared && swift test )

          # Run Swift tests for macOS app
          ( cd apps/macos && swift test )

      - name: Determine image tags
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          # Lowercase repository owner for GHCR
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            TAG_PREFIX="pr-${PR_NUMBER}"
          else
            TAG_PREFIX="sha-$(echo ${COMMIT_SHA} | cut -c1-7)"
            # Also tag as 'latest' for main branch
            if [ "${GIT_REF}" = "refs/heads/main" ]; then
              echo "is_main=true" >> $GITHUB_OUTPUT
            fi
          fi

          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "tag_prefix=${TAG_PREFIX}" >> $GITHUB_OUTPUT

      - name: Push images to GHCR (crane)
        env:
          OWNER: ${{ steps.tags.outputs.owner }}
          TAG_PREFIX: ${{ steps.tags.outputs.tag_prefix }}
          IS_MAIN: ${{ steps.tags.outputs.is_main }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${OWNER}/eidolons-server"
          export IMAGE

          # Use crane from the pinned flake (no Docker needed)
          nix develop --command bash -c '
            set -euo pipefail

            # Authenticate once for GHCR
            crane auth login ghcr.io -u "$GITHUB_ACTOR" -p "$GITHUB_TOKEN"

            # Use a local directory for intermediate files. The GitHub Actions runner
            # is ephemeral, so explicit cleanup is not necessary.
            mkdir -p $RUNNER_TEMP/out/oci-images

            # dockerTools outputs gzip-compressed archives; crane expects plain tar
            gunzip_archive() {
              local gz="$1"
              local out="$2"
              gzip -dc "$gz" > "$out"
            }

            # Decompress archives once
            tar_x86="$RUNNER_TEMP/out/oci-images/server-oci--x86_64-unknown-linux-musl.tar"
            tar_arm="$RUNNER_TEMP/out/oci-images/server-oci--aarch64-unknown-linux-musl.tar"
            gunzip_archive $RUNNER_TEMP/out/server-oci--x86_64-unknown-linux-musl.tar.gz "$tar_x86"
            gunzip_archive $RUNNER_TEMP/out/server-oci--aarch64-unknown-linux-musl.tar.gz "$tar_arm"

            # Push architecture-specific images
            crane push "$tar_x86" "${IMAGE}:${TAG_PREFIX}-amd64"
            crane push "$tar_arm" "${IMAGE}:${TAG_PREFIX}-arm64"

            # Optional "latest" tags for main
            if [ "${IS_MAIN}" = "true" ]; then
              crane push "$tar_x86" "${IMAGE}:latest-amd64"
              crane push "$tar_arm" "${IMAGE}:latest-arm64"
            fi

            # Create multi-arch manifests pointing at the uploaded images
            crane index append -t "${IMAGE}:${TAG_PREFIX}" \
              -m "${IMAGE}:${TAG_PREFIX}-amd64" \
              -m "${IMAGE}:${TAG_PREFIX}-arm64"

            if [ "${IS_MAIN}" = "true" ]; then
              crane index append -t "${IMAGE}:latest" \
                -m "${IMAGE}:latest-amd64" \
                -m "${IMAGE}:latest-arm64"
            fi
          '
