name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  # ── Rust checks (cheap ubuntu runner) ────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: rust-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check OpenAPI spec freshness
        run: |
          cargo run -q -p generate-openapi > /tmp/openapi-generated.json
          if ! diff /tmp/openapi-generated.json crates/eidola-server/openapi.json; then
            echo ""
            echo "ERROR: Committed OpenAPI spec doesn't match generated one!"
            echo "Run: just update-openapi"
            exit 1
          fi

  # ── OCI images (cheap ubuntu runner) ─────────────────────────────────────────
  oci:
    name: Build and verify OCI images
    needs: rust-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      BAKE_METADATA_FILE: ${{ github.workspace }}/.bake-metadata.json
      BUILDX_CACHE_DIR: ${{ github.workspace }}/.buildx-cache
      BUILDX_CACHE_DIR_NEW: ${{ github.workspace }}/.buildx-cache-new
    outputs:
      artifact_manifest: ${{ steps.partial.outputs.actual }}
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore OCI Buildx cache
        id: buildx-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.BUILDX_CACHE_DIR }}
          key: buildx-oci-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', '**/Cargo.toml', 'rust-toolchain.toml', 'docker-bake.hcl', 'compose.yaml', 'oci/**/Containerfile') }}
          restore-keys: |
            buildx-oci-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: v0.31.1
          platforms: linux/amd64
          driver-opts: |
            image=moby/buildkit:v0.28.0@sha256:60bfb07e39a6e524e78e6c4723114902c6b61ee36714493e357e39861bea753b

      - name: Build OCI images
        run: |
          CACHE_ARGS=()

          if [ -d "${BUILDX_CACHE_DIR}" ]; then
            CACHE_ARGS+=(--set "*.cache-from=type=local,src=${BUILDX_CACHE_DIR}")
          fi

          CACHE_ARGS+=(--set "*.cache-to=type=local,dest=${BUILDX_CACHE_DIR_NEW},mode=max")

          ./scripts/artifact-manifest.sh build \
            --metadata-file "${BAKE_METADATA_FILE}" \
            "${CACHE_ARGS[@]}"

      - name: Rotate OCI Buildx cache
        if: always()
        run: |
          rm -rf "${BUILDX_CACHE_DIR}"
          if [ -d "${BUILDX_CACHE_DIR_NEW}" ]; then
            mv "${BUILDX_CACHE_DIR_NEW}" "${BUILDX_CACHE_DIR}"
          else
            mkdir -p "${BUILDX_CACHE_DIR}"
          fi

      - name: Save OCI Buildx cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.BUILDX_CACHE_DIR }}
          key: ${{ steps.buildx-cache.outputs.cache-primary-key }}

      - name: Record OCI artifact manifest
        id: partial
        run: |
          echo "actual<<EOF" >> "$GITHUB_OUTPUT"
          ./scripts/artifact-manifest.sh print --metadata-file "${BAKE_METADATA_FILE}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify OCI artifact subset
        id: verify
        run: |
          if ./scripts/artifact-manifest.sh verify --metadata-file "${BAKE_METADATA_FILE}" --manifest artifact-manifest.json; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug image structure
        if: steps.verify.outputs.match == 'false'
        run: |
          echo "=== Builder info ==="
          docker buildx version
          docker buildx inspect --bootstrap 2>/dev/null | head -20

          for IMAGE in eidola-server eidola-cli eidola-postgres; do
            echo ""
            echo "=============== $IMAGE ==============="
            DIR="/tmp/${IMAGE}-debug"
            mkdir -p "$DIR"
            docker save "${IMAGE}:dev" | tar -xf - -C "$DIR"

            MANIFEST_DIGEST=$(jq -r '.manifests[0].digest' "$DIR/index.json" | cut -d: -f2)

            echo "=== Index ==="
            jq . "$DIR/index.json"

            echo "=== Manifest (sha256:${MANIFEST_DIGEST:0:12}...) ==="
            jq . "$DIR/blobs/sha256/$MANIFEST_DIGEST"

            CONFIG_DIGEST=$(jq -r '.config.digest' "$DIR/blobs/sha256/$MANIFEST_DIGEST" | cut -d: -f2)
            echo "=== Config (sha256:${CONFIG_DIGEST:0:12}...) ==="
            jq . "$DIR/blobs/sha256/$CONFIG_DIGEST"

            echo "=== Layer listing ==="
            jq -r '.layers[] | "\(.digest) \(.mediaType)"' "$DIR/blobs/sha256/$MANIFEST_DIGEST" | while read -r LAYER MEDIA; do
              HASH="${LAYER#sha256:}"
              SIZE=$(stat -c%s "$DIR/blobs/sha256/$HASH" 2>/dev/null || stat -f%z "$DIR/blobs/sha256/$HASH")
              echo "  $LAYER  size=$SIZE  type=$MEDIA"
              echo "  First 20 tar entries:"
              if echo "$MEDIA" | grep -q gzip; then
                gzip -dc "$DIR/blobs/sha256/$HASH" | tar -tf - 2>/dev/null | head -20 | sed 's/^/    /'
              else
                tar -tf "$DIR/blobs/sha256/$HASH" 2>/dev/null | head -20 | sed 's/^/    /'
              fi
            done
          done

      - name: Log in to GHCR
        if: steps.verify.outputs.match == 'true' && github.event_name == 'push'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        if: steps.verify.outputs.match == 'true' && github.event_name == 'push'
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          REGISTRY="ghcr.io/${OWNER}"
          SHORT_SHA=$(echo "${COMMIT_SHA}" | cut -c1-7)

          TAGS="sha-${SHORT_SHA}"

          if [ "${GIT_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},main"
          elif [[ "${GIT_REF}" == refs/tags/v* ]]; then
            VERSION="${GIT_REF#refs/tags/}"
            TAGS="${TAGS},${VERSION}"
          fi

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Push images to GHCR
        if: steps.verify.outputs.match == 'true' && github.event_name == 'push'
        env:
          REGISTRY: ${{ steps.tags.outputs.registry }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          IFS=',' read -ra TAG_LIST <<< "${TAGS}"

          for IMAGE in eidola-server eidola-cli eidola-postgres; do
            for TAG in "${TAG_LIST[@]}"; do
              docker tag "${IMAGE}:dev" "${REGISTRY}/${IMAGE}:${TAG}"
              docker push "${REGISTRY}/${IMAGE}:${TAG}"
            done
          done

  # ── Apple (expensive macOS runner) ───────────────────────────────────────────
  apple:
    name: Apple builds
    needs: rust-checks
    runs-on: self-hosted
    timeout-minutes: 30
    outputs:
      artifact_manifest: ${{ steps.partial.outputs.actual }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Swift formatting
        run: nix build '.#checks.aarch64-darwin.swift-formatting' --show-trace

      - name: Check Swift bindings freshness
        run: nix build '.#checks.aarch64-darwin.swift-bindings-current' --show-trace

      - name: Build macOS artifacts
        id: partial
        run: |
          ./scripts/artifact-manifest.sh build-macos \
            --macos-paths-file /tmp/macos-artifacts.json \
            --output /tmp/macos-artifact-manifest.json

          echo "actual<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/macos-artifact-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Swift tests
        run: |
          # Build the XCFramework and update the local path for SPM
          nix run '.#update-eidola-shared-swift-xcframework'

          # Run Swift tests for shared core
          ( cd crates/eidola-shared && swift test )

          # Run Swift tests for macOS app
          ( cd apps/macos && swift test )

  artifact-manifest:
    name: Verify artifact manifest
    needs:
      - oci
      - apple
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Combine partial manifests
        run: |
          cat > /tmp/oci-artifact-manifest.json <<'EOF'
          ${{ needs.oci.outputs.artifact_manifest }}
          EOF

          cat > /tmp/apple-artifact-manifest.json <<'EOF'
          ${{ needs.apple.outputs.artifact_manifest }}
          EOF

          ./scripts/artifact-manifest.sh merge \
            --partial /tmp/oci-artifact-manifest.json \
            --partial /tmp/apple-artifact-manifest.json \
            --output /tmp/artifact-manifest-actual.json

      - name: Verify full artifact manifest
        id: verify
        run: |
          echo "actual<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/artifact-manifest-actual.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if ./scripts/artifact-manifest.sh verify-full \
            --partial /tmp/oci-artifact-manifest.json \
            --partial /tmp/apple-artifact-manifest.json \
            --manifest artifact-manifest.json; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Request manifest update (PR only)
        if: steps.verify.outputs.match == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTUAL: ${{ steps.verify.outputs.actual }}
        run: |
          FORMATTED=$(echo "$ACTUAL" | jq '.')

          # Post a REQUEST_CHANGES review with the expected manifest in the
          # body. We avoid line-level suggestions because GitHub's UI cannot
          # apply them when the diff contains deleted-and-replaced lines,
          # which happens on virtually every manifest update.
          BODY=$(printf '**Artifact Manifest Update Required**\n\nThe built OCI and macOS artifacts produce different digests than what is committed in `artifact-manifest.json`.\n\nRun `just update-manifest` on macOS to regenerate it, or replace the file contents with:\n\n```json\n%s\n```' "$FORMATTED")

          jq -n \
            --arg body "$BODY" \
            '{
              event: "REQUEST_CHANGES",
              body: $body
            }' | gh api --silent -X POST \
              "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
              --input -

      - name: Fail on manifest mismatch
        if: steps.verify.outputs.match == 'false'
        run: exit 1
