name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-all-platforms:
    name: Build all platforms
    # runs-on: macos-26 # Apple Silicon for native macOS + cross-compile to Linux
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@f9ebef276016dd519d188ee7b71879732418f8b9 # v3.16.0

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v8
        with:
          # Without a paid account, the action will perform an unnecessary check and issue a warning
          # unless this is set to false
          use-flakehub: false
          source-url: https://github.com/mike-marcacci/magic-nix-cache/releases/download/v0.0.1-skip-upstream-test/magic-nix-cache-closure-ARM64-macOS.xz

      - name: Show flake info
        run: nix flake show

      - name: Run all checks
        run: nix flake check --show-trace --max-jobs auto

      - name: Build Swift packages
        run: |
          # Build the XCFramework via Nix and update the local path
          nix run '.#update-eidolons-shared-swift-xcframework'

          # Build native apps
          # Note that we *cannot* use nix until Swift 6 is available in nixpkgs
          ( cd apps/macos && Support/package-app.sh )

      - name: Run Swift tests
        run: |
          # Run Swift tests for shared core
          ( cd crates/eidolons-shared && swift test )

          # Run Swift tests for macOS app
          ( cd apps/macos && swift test )
