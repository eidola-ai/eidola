name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-all-platforms:
    name: Build all platforms
    runs-on: macos-26 # Apple Silicon for native macOS + cross-compile to Linux
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v8

      - name: Show flake info
        run: nix flake show

      - name: Run all checks
        run: nix flake check --show-trace
        # Checks include: formatting, clippy, Rust tests, Swift bindings verification
        # Note: Checks run on current system (aarch64-darwin) only
        # This is sufficient as code quality checks are platform-independent
        # Cross-compiled packages are built and verified below
        # Swift tests run separately (XCTest requires system Xcode)

      - name: Build all packages
        run: |
          # Native macOS packages
          nix build '.#server' -L -o result-macos
          nix build '.#core' -L -o result-core

          # Swift bindings (macOS only)
          nix build '.#swift-bindings' -L -o result-swift-bindings

          # Cross-compiled Linux packages
          nix build '.#server-x86_64-linux' -L -o result-linux-x86
          nix build '.#server-aarch64-linux' -L -o result-linux-arm

          # OCI images (Linux only)
          nix build '.#server-oci-x86_64-linux' -L -o result-oci-x86
          nix build '.#server-oci-aarch64-linux' -L -o result-oci-arm

      - name: Verify build outputs
        run: |
          echo "=== Native macOS server ==="
          file result-macos/bin/eidolons-server

          echo "=== Linux x86_64 server ==="
          file result-linux-x86/bin/eidolons-server

          echo "=== Linux aarch64 server ==="
          file result-linux-arm/bin/eidolons-server

          echo "=== Swift bindings ==="
          ls -lh result-swift-bindings/Sources/EidolonsCore/
          ls -lh result-swift-bindings/Sources/EidolonsCoreFFI/

          echo "=== OCI images ==="
          ls -lh result-oci-*

      - name: Run Swift tests
        run: |
          # Build the XCFramework via Nix (reproducible, no Xcode needed)
          nix build '.#xcframework' -L -o result-xcframework

          # Set up XCFramework where Package.swift expects it
          mkdir -p core/target/apple
          cp -r result-xcframework core/target/apple/libeidolons-rs.xcframework

          # Run Swift tests using system Swift (XCTest requires Xcode)
          cd core && swift test

      - name: Upload macOS server binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: eidolons-server-macos-aarch64
          path: result-macos/bin/eidolons-server
          if-no-files-found: error

      - name: Upload Linux x86_64 server binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: eidolons-server-linux-x86_64
          path: result-linux-x86/bin/eidolons-server
          if-no-files-found: error

      - name: Upload Linux aarch64 server binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: eidolons-server-linux-aarch64
          path: result-linux-arm/bin/eidolons-server
          if-no-files-found: error

      - name: Determine image tags
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          # Lowercase repository owner for GHCR
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            TAG_PREFIX="pr-${PR_NUMBER}"
          else
            TAG_PREFIX="sha-$(echo ${COMMIT_SHA} | cut -c1-7)"
            # Also tag as 'latest' for main branch
            if [ "${GIT_REF}" = "refs/heads/main" ]; then
              echo "is_main=true" >> $GITHUB_OUTPUT
            fi
          fi

          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "tag_prefix=${TAG_PREFIX}" >> $GITHUB_OUTPUT

      - name: Push images to GHCR (crane)
        env:
          OWNER: ${{ steps.tags.outputs.owner }}
          TAG_PREFIX: ${{ steps.tags.outputs.tag_prefix }}
          IS_MAIN: ${{ steps.tags.outputs.is_main }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${OWNER}/eidolons-server"
          export IMAGE

          # Use crane from the pinned flake (no Docker needed)
          nix shell .#crane-cli --command bash -c '
            set -euo pipefail

            # Authenticate once for GHCR
            crane auth login ghcr.io -u "$GITHUB_ACTOR" -p "$GITHUB_TOKEN"

            # Use a local directory for intermediate files. The GitHub Actions runner
            # is ephemeral, so explicit cleanup is not necessary.
            mkdir -p ./oci-images

            # dockerTools outputs gzip-compressed archives; crane expects plain tar
            gunzip_archive() {
              local gz="$1"
              local out="$2"
              gzip -dc "$gz" > "$out"
            }

            # Decompress archives once
            tar_x86="./oci-images/result-oci-x86.tar"
            tar_arm="./oci-images/result-oci-arm.tar"
            gunzip_archive result-oci-x86 "$tar_x86"
            gunzip_archive result-oci-arm "$tar_arm"

            # Push architecture-specific images
            crane push "$tar_x86" "${IMAGE}:${TAG_PREFIX}-amd64"
            crane push "$tar_arm" "${IMAGE}:${TAG_PREFIX}-arm64"

            # Optional "latest" tags for main
            if [ "${IS_MAIN}" = "true" ]; then
              crane push "$tar_x86" "${IMAGE}:latest-amd64"
              crane push "$tar_arm" "${IMAGE}:latest-arm64"
            fi

            # Create multi-arch manifests pointing at the uploaded images
            crane index append -t "${IMAGE}:${TAG_PREFIX}" \
              -m "${IMAGE}:${TAG_PREFIX}-amd64" \
              -m "${IMAGE}:${TAG_PREFIX}-arm64"

            if [ "${IS_MAIN}" = "true" ]; then
              crane index append -t "${IMAGE}:latest" \
                -m "${IMAGE}:latest-amd64" \
                -m "${IMAGE}:latest-arm64"
            fi
          '
