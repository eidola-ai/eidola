name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-all-platforms:
    name: Build all platforms
    runs-on: macos-14 # Apple Silicon for native macOS + cross-compile to Linux
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Nix
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31.9.0
        with:
          # Enable flakes and nix-command
          extra_nix_config: |
            experimental-features = nix-command flakes
            # Allow building for other platforms
            extra-platforms = x86_64-darwin aarch64-darwin

      - name: Setup Nix cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: |
            /nix/store
            /nix/var/nix
            ~/.cache/nix
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Show flake info
        run: nix flake show

      - name: Run all checks
        run: nix flake check --show-trace
        # Note: Checks run on current system (aarch64-darwin) only
        # This is sufficient as code quality checks are platform-independent
        # Cross-compiled packages are built and verified below

      - name: Build all packages
        run: |
          # Native macOS packages
          nix build '.#server' -L -o result-macos
          nix build '.#core' -L -o result-core

          # Cross-compiled Linux packages
          nix build '.#server-x86_64-linux' -L -o result-linux-x86
          nix build '.#server-aarch64-linux' -L -o result-linux-arm

          # OCI images (Linux only)
          nix build '.#server-oci-x86_64-linux' -L -o result-oci-x86
          nix build '.#server-oci-aarch64-linux' -L -o result-oci-arm

      - name: Verify build outputs
        run: |
          echo "=== Native macOS server ==="
          file result-macos/bin/eidolons-server

          echo "=== Linux x86_64 server ==="
          file result-linux-x86/bin/eidolons-server

          echo "=== Linux aarch64 server ==="
          file result-linux-arm/bin/eidolons-server

          echo "=== OCI images ==="
          ls -lh result-oci-*

      - name: Upload macOS server binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: eidolons-server-macos-aarch64
          path: result-macos/bin/eidolons-server
          if-no-files-found: error

      - name: Upload Linux x86_64 server binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: eidolons-server-linux-x86_64
          path: result-linux-x86/bin/eidolons-server
          if-no-files-found: error

      - name: Upload Linux aarch64 server binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: eidolons-server-linux-aarch64
          path: result-linux-arm/bin/eidolons-server
          if-no-files-found: error

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          # Lowercase repository owner for GHCR
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            TAG_PREFIX="pr-${PR_NUMBER}"
          else
            TAG_PREFIX="sha-$(echo ${COMMIT_SHA} | cut -c1-7)"
            # Also tag as 'latest' for main branch
            if [ "${GIT_REF}" = "refs/heads/main" ]; then
              echo "is_main=true" >> $GITHUB_OUTPUT
            fi
          fi

          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "tag_prefix=${TAG_PREFIX}" >> $GITHUB_OUTPUT

      - name: Push x86_64 image to GHCR
        env:
          OWNER: ${{ steps.tags.outputs.owner }}
          TAG_PREFIX: ${{ steps.tags.outputs.tag_prefix }}
          IS_MAIN: ${{ steps.tags.outputs.is_main }}
        run: |
          IMAGE="ghcr.io/${OWNER}/eidolons-server"

          # Load the Nix-built image
          docker load < result-oci-x86

          # Tag and push
          docker tag eidolons-server:latest "${IMAGE}:${TAG_PREFIX}-amd64"
          docker push "${IMAGE}:${TAG_PREFIX}-amd64"

          # Also tag as latest-amd64 if on main
          if [ "${IS_MAIN}" = "true" ]; then
            docker tag eidolons-server:latest "${IMAGE}:latest-amd64"
            docker push "${IMAGE}:latest-amd64"
          fi

      - name: Push aarch64 image to GHCR
        env:
          OWNER: ${{ steps.tags.outputs.owner }}
          TAG_PREFIX: ${{ steps.tags.outputs.tag_prefix }}
          IS_MAIN: ${{ steps.tags.outputs.is_main }}
        run: |
          IMAGE="ghcr.io/${OWNER}/eidolons-server"

          # Load the Nix-built image
          docker load < result-oci-arm

          # Tag and push
          docker tag eidolons-server:latest "${IMAGE}:${TAG_PREFIX}-arm64"
          docker push "${IMAGE}:${TAG_PREFIX}-arm64"

          # Also tag as latest-arm64 if on main
          if [ "${IS_MAIN}" = "true" ]; then
            docker tag eidolons-server:latest "${IMAGE}:latest-arm64"
            docker push "${IMAGE}:latest-arm64"
          fi

      - name: Create and push multi-arch manifest
        env:
          OWNER: ${{ steps.tags.outputs.owner }}
          TAG_PREFIX: ${{ steps.tags.outputs.tag_prefix }}
          IS_MAIN: ${{ steps.tags.outputs.is_main }}
        run: |
          IMAGE="ghcr.io/${OWNER}/eidolons-server"

          # Create and push manifest for the specific tag (PR or commit SHA)
          docker manifest create "${IMAGE}:${TAG_PREFIX}" \
            "${IMAGE}:${TAG_PREFIX}-amd64" \
            "${IMAGE}:${TAG_PREFIX}-arm64"
          docker manifest push "${IMAGE}:${TAG_PREFIX}"

          # Also create 'latest' manifest if on main
          if [ "${IS_MAIN}" = "true" ]; then
            docker manifest create "${IMAGE}:latest" \
              "${IMAGE}:latest-amd64" \
              "${IMAGE}:latest-arm64"
            docker manifest push "${IMAGE}:latest"
          fi
