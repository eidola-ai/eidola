name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

# Cancel superseded PR runs; let pushes to main and tag releases finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  # ── Rust checks (cheap ubuntu runner) ────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        # save-if scopes writes to main; this job only runs tests, no
        # artifact from here is published.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: |
          echo "::add-matcher::.github/rust-problem-matcher.json"
          cargo clippy --all-targets -- -D warnings
          echo "::remove-matcher owner=rust::"

      - name: Run tests
        run: cargo test

      - name: Check OpenAPI spec freshness
        run: |
          cargo run -q -p generate-openapi > /tmp/openapi-generated.json
          if ! diff /tmp/openapi-generated.json crates/eidola-server/openapi.json; then
            echo ""
            echo "ERROR: Committed OpenAPI spec doesn't match generated one!"
            echo "Run: just update-openapi"
            exit 1
          fi

  # ── OCI images + enclave recompute (cheap ubuntu runner) ────────────────────
  # Mirrors the local `just update-manifest` two-phase flow so every
  # downstream consumer (cli OCI build, apple Nix build, artifact-manifest
  # verification) sees a single coherent trust root derived from the
  # freshly-built server image:
  #
  #   Phase 1: bake server + postgres → server digest.
  #   Phase 2: stamp the server digest into tinfoil-config.yml.
  #   Phase 3: recompute the enclave from the stamped config and overwrite
  #            releases/trust/server-enclave.json in the workspace.
  #   Phase 4: bake cli (its OCI Containerfile COPYs server-enclave.json
  #            from Phase 3, so the cli is hardcoded against the same
  #            enclave the actually-built server will produce).
  #   Phase 5: emit the stamped config, recomputed enclave, and combined
  #            OCI partial as job outputs for apple + artifact-manifest.
  #
  # Closing the chain end-to-end inside one job means CI's view of
  # tinfoil-config.yml ↔ server-enclave.json ↔ cli-digest ↔ manifest is
  # always internally consistent — so the PR-comment suggestion is too.
  oci:
    name: Build OCI images + recompute enclave
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      SERVER_BAKE_METADATA_FILE: ${{ github.workspace }}/.bake-server.json
      CLI_BAKE_METADATA_FILE: ${{ github.workspace }}/.bake-cli.json
    outputs:
      stamped_tinfoil_config: ${{ steps.stamp.outputs.config }}
      server_enclave: ${{ steps.measure.outputs.content }}
      artifact_manifest: ${{ steps.partial.outputs.actual }}
    permissions:
      contents: read
      packages: write # push OCI images to ghcr.io on push events
      pull-requests: write # surfaced through artifact-manifest job; declared here for parity

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # measure-enclave (Phase 3) is a workspace cargo binary.
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache CVM artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.4 # zizmor: ignore[cache-poisoning]
        with:
          path: ~/.cache/eidola/cvm
          key: cvm-${{ hashFiles('tinfoil-config.yml') }}

      - name: Set up Docker Buildx
        # v* tag (release) builds skip the GHA cache entirely so Sigstore-
        # attested artifacts come from a clean compile (see Phase 1/4
        # below). PR/main builds use type=gha cache, which is
        # branch-scoped — PR branches cannot write the main scope.
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.0.0 # zizmor: ignore[cache-poisoning]
        with:
          version: v0.31.1
          platforms: linux/amd64
          driver-opts: |
            image=moby/buildkit:v0.28.0@sha256:60bfb07e39a6e524e78e6c4723114902c6b61ee36714493e357e39861bea753b

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        if: github.event_name == 'push'
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          REGISTRY="ghcr.io/${OWNER}"
          SHORT_SHA=$(echo "${COMMIT_SHA}" | cut -c1-7)

          TAGS="sha-${SHORT_SHA}"

          if [ "${GIT_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},main"
          elif [[ "${GIT_REF}" == refs/tags/v* ]]; then
            VERSION="${GIT_REF#refs/tags/}"
            TAGS="${TAGS},${VERSION}"
          fi

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Phase 1 — build server + postgres
        env:
          REGISTRY: ${{ steps.tags.outputs.registry || '' }}
          TAGS: ${{ steps.tags.outputs.tags || 'dev' }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          PUSH_FLAG=""
          if [ "${EVENT_NAME}" = "push" ]; then
            PUSH_FLAG="--push"
          fi

          # Skip the GHA cache for v* release tags so Sigstore-attested
          # artifacts are built clean and don't depend on cache state
          # written by other refs.
          CACHE_ARGS=()
          if [[ "${GIT_REF}" != refs/tags/v* ]]; then
            CACHE_ARGS=(--set "*.cache-from=type=gha" --set "*.cache-to=type=gha,mode=max")
          fi

          ./scripts/artifact-manifest.sh build \
            ${PUSH_FLAG} --targets server \
            --metadata-file "${SERVER_BAKE_METADATA_FILE}" \
            "${CACHE_ARGS[@]}"

      - name: Phase 2 — stamp tinfoil-config.yml with built server digest
        id: stamp
        run: |
          ./scripts/artifact-manifest.sh stamp-config \
            --metadata-file "${SERVER_BAKE_METADATA_FILE}"
          {
            echo 'config<<__EIDOLA_EOF__'
            cat tinfoil-config.yml
            echo '__EIDOLA_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Phase 3 — recompute server-enclave.json
        id: measure
        run: |
          # Overwrite the workspace file in place. Phase 4 (cli build)
          # COPYs releases/trust/server-enclave.json into its build
          # context, so this makes the cli embed the enclave that
          # corresponds to the actually-built server.
          ./scripts/artifact-manifest.sh measure \
            --server-enclave-output releases/trust/server-enclave.json
          {
            echo 'content<<__EIDOLA_EOF__'
            cat releases/trust/server-enclave.json
            echo '__EIDOLA_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Phase 4 — build cli OCI image
        env:
          REGISTRY: ${{ steps.tags.outputs.registry || '' }}
          TAGS: ${{ steps.tags.outputs.tags || 'dev' }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          PUSH_FLAG=""
          if [ "${EVENT_NAME}" = "push" ]; then
            PUSH_FLAG="--push"
          fi

          CACHE_ARGS=()
          if [[ "${GIT_REF}" != refs/tags/v* ]]; then
            CACHE_ARGS=(--set "*.cache-from=type=gha" --set "*.cache-to=type=gha,mode=max")
          fi

          ./scripts/artifact-manifest.sh build \
            ${PUSH_FLAG} --targets cli \
            --metadata-file "${CLI_BAKE_METADATA_FILE}" \
            "${CACHE_ARGS[@]}"

      - name: Phase 5 — record combined OCI partial
        id: partial
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PUSH_FLAG=""
          if [ "${EVENT_NAME}" = "push" ]; then
            PUSH_FLAG="--push"
          fi
          {
            echo 'actual<<__EIDOLA_EOF__'
            ./scripts/artifact-manifest.sh print ${PUSH_FLAG} \
              --metadata-file "${SERVER_BAKE_METADATA_FILE}" --targets "server postgres" \
              --metadata-file "${CLI_BAKE_METADATA_FILE}" --targets cli
            echo '__EIDOLA_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Verify OCI artifact subset
        id: verify
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PUSH_FLAG=""
          if [ "${EVENT_NAME}" = "push" ]; then
            PUSH_FLAG="--push"
          fi
          if ./scripts/artifact-manifest.sh verify ${PUSH_FLAG} \
            --metadata-file "${SERVER_BAKE_METADATA_FILE}" --targets "server postgres" \
            --metadata-file "${CLI_BAKE_METADATA_FILE}" --targets cli \
            --manifest artifact-manifest.json; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug build metadata
        if: steps.verify.outputs.match == 'false'
        run: |
          echo "=== Builder info ==="
          docker buildx version
          docker buildx inspect --bootstrap 2>/dev/null | head -20

          echo ""
          echo "=== Server bake metadata ==="
          jq . "${SERVER_BAKE_METADATA_FILE}"

          echo ""
          echo "=== Cli bake metadata ==="
          jq . "${CLI_BAKE_METADATA_FILE}"

          echo ""
          echo "=== Committed manifest ==="
          jq . artifact-manifest.json

  # ── Apple (expensive macOS runner) ───────────────────────────────────────────
  # This uses https://github.com/khoi/sand to provision a runner from a known image:
  # ghcr.io/cirruslabs/macos-tahoe-xcode@sha256:a914e5b3fc1197d61832009778a77ca30717314fd32702cfdf90a42f2c279ea3
  apple:
    name: Apple builds
    needs: oci
    runs-on: self-hosted # zizmor: ignore[self-hosted-runner] -- macOS Nix universal-binary builds require an Apple-silicon runner
    # 60 minutes covers a cold cachix miss for both the cli and the GUI
    # (gpui is a large dep tree); warm runs typically finish in <10.
    timeout-minutes: 60
    # Only main and v* tag pushes acquire the Cachix write token, gated by
    # the branch-restricted `cachix-write` environment in repo settings.
    # Other runs (PRs, schedule, dispatch) get no environment and pull
    # anonymously from the public Cachix cache.
    environment: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) && 'cachix-write' || '' }}
    outputs:
      artifact_manifest: ${{ steps.partial.outputs.actual }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install stamped tinfoil-config.yml + recomputed server-enclave.json
        env:
          STAMPED_CONFIG: ${{ needs.oci.outputs.stamped_tinfoil_config }}
          SERVER_ENCLAVE: ${{ needs.oci.outputs.server_enclave }}
        run: |
          # Overwrite the workspace copies with the authoritative values the
          # `oci` job produced from its end-to-end run (server build →
          # stamp → measure). The flake's source filter picks up the
          # working-tree content (both files are git-tracked), so this
          # makes the macOS cli embed exactly the same trust root the
          # linux cli OCI image was built against.
          printf '%s\n' "$STAMPED_CONFIG" > tinfoil-config.yml
          printf '%s\n' "$SERVER_ENCLAVE" > releases/trust/server-enclave.json

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            sandbox = true
            sandbox-fallback = false

      - name: Configure Nix binary cache
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: eidola
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build macOS CLI universal binary
        id: partial
        run: |
          ./scripts/artifact-manifest.sh build-macos \
            --output /tmp/macos-artifact-manifest.json

          echo "actual<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/macos-artifact-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  artifact-manifest:
    name: Verify artifact manifest
    needs:
      - rust-checks
      - oci
      - apple
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write # post REQUEST_CHANGES review when manifest is stale

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        # save-if scopes writes to main; this job only verifies the manifest,
        # it does not produce any published artifact.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache CVM artifacts
        # CVM kernel/initrd downloads are Sigstore-verified by the
        # --verify-attestations flag below, so a poisoned cache is rejected
        # at verification time.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning]
        with:
          path: ~/.cache/eidola/cvm
          key: cvm-${{ hashFiles('tinfoil-config.yml') }}

      - name: Materialize oci outputs and build partials
        env:
          STAMPED_CONFIG: ${{ needs.oci.outputs.stamped_tinfoil_config }}
          SERVER_ENCLAVE: ${{ needs.oci.outputs.server_enclave }}
          OCI_MANIFEST: ${{ needs.oci.outputs.artifact_manifest }}
          APPLE_MANIFEST: ${{ needs.apple.outputs.artifact_manifest }}
        run: |
          # Overwrite the workspace tinfoil-config.yml and server-enclave.json
          # with the authoritative values the oci job produced. verify-full
          # below reads both via --config / --server-enclave and recomputes
          # the enclave from the stamped config — by construction the
          # recompute equals the server-enclave we just installed, so the
          # only thing being verified is "does the committed
          # artifact-manifest.json equal what the build actually produced?"
          printf '%s\n' "$STAMPED_CONFIG" > tinfoil-config.yml
          printf '%s\n' "$SERVER_ENCLAVE" > releases/trust/server-enclave.json
          printf '%s' "$OCI_MANIFEST" > /tmp/oci-artifact-manifest.json
          printf '%s' "$APPLE_MANIFEST" > /tmp/apple-artifact-manifest.json

      - name: Verify full artifact manifest
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ./scripts/artifact-manifest.sh verify-full \
            --partial /tmp/oci-artifact-manifest.json \
            --partial /tmp/apple-artifact-manifest.json \
            --manifest artifact-manifest.json \
            --config tinfoil-config.yml \
            --server-enclave releases/trust/server-enclave.json \
            --output /tmp/artifact-manifest-actual.json \
            --verify-attestations; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Request manifest update (PR only)
        if: steps.verify.outputs.match == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STAMPED_CONFIG: ${{ needs.oci.outputs.stamped_tinfoil_config }}
          SERVER_ENCLAVE: ${{ needs.oci.outputs.server_enclave }}
        run: |
          MANIFEST_FORMATTED=$(jq -S '.' /tmp/artifact-manifest-actual.json)
          SERVER_ENCLAVE_FORMATTED=$(printf '%s' "$SERVER_ENCLAVE" | jq -S '.')

          # Post a REQUEST_CHANGES review with all three expected files.
          # The oci job built the server, stamped its digest into
          # tinfoil-config.yml, recomputed the enclave, then built the cli
          # against that — and apple did the same — so the three files
          # below form an internally-consistent set: committing them
          # verbatim is guaranteed to pass the next CI run. We avoid
          # line-level suggestions because GitHub's UI cannot apply them
          # when the diff contains deleted-and-replaced lines, which
          # happens on virtually every manifest update.
          BODY=$(printf '**Artifact Manifest Update Required**\n\nCI built the server, stamped its digest into `tinfoil-config.yml`, recomputed the enclave, then built the cli (OCI + macOS) against that. The three files below are the result and are internally consistent — committing them verbatim will pass the next CI run. Locally, `just update-manifest` produces the same set.\n\n`tinfoil-config.yml`:\n\n```yaml\n%s\n```\n\n`releases/trust/server-enclave.json`:\n\n```json\n%s\n```\n\n`artifact-manifest.json`:\n\n```json\n%s\n```' "$STAMPED_CONFIG" "$SERVER_ENCLAVE_FORMATTED" "$MANIFEST_FORMATTED")

          jq -n \
            --arg body "$BODY" \
            '{
              event: "REQUEST_CHANGES",
              body: $body
            }' | gh api --silent -X POST \
              "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --input -

      - name: Fail on manifest mismatch
        if: steps.verify.outputs.match == 'false'
        run: exit 1
