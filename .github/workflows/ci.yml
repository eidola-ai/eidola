name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

# Cancel superseded PR runs; let pushes to main and tag releases finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  # ── Rust checks (cheap ubuntu runner) ────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        # save-if scopes writes to main; this job only runs tests, no
        # artifact from here is published.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: |
          echo "::add-matcher::.github/rust-problem-matcher.json"
          cargo clippy --all-targets -- -D warnings
          echo "::remove-matcher owner=rust::"

      - name: Run tests
        run: cargo test

      - name: Check OpenAPI spec freshness
        run: |
          cargo run -q -p generate-openapi > /tmp/openapi-generated.json
          if ! diff /tmp/openapi-generated.json crates/eidola-server/openapi.json; then
            echo ""
            echo "ERROR: Committed OpenAPI spec doesn't match generated one!"
            echo "Run: just update-openapi"
            exit 1
          fi

  # ── Recompute server-enclave.json (cheap ubuntu runner) ─────────────────────
  # Single source of truth for the paired-server enclave measurement. The
  # `oci` and `apple` jobs both consume this output and use it to override
  # the committed `releases/trust/server-enclave.json` before building
  # their cli artifacts. That way the cli OCI digest and macOS narHash
  # they produce are always derived from the *correct* trust root, so
  # `artifact-manifest`'s PR-comment suggestion is always actionable —
  # even when the committed `server-enclave.json` has drifted.
  enclave:
    name: Recompute server-enclave.json
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      server_enclave: ${{ steps.recompute.outputs.content }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache CVM artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/eidola/cvm
          key: cvm-${{ hashFiles('tinfoil-config.yml') }}

      - name: Recompute server-enclave.json
        id: recompute
        run: |
          ./scripts/artifact-manifest.sh measure \
            --server-enclave-output /tmp/server-enclave.json

          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/server-enclave.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  # ── OCI images (cheap ubuntu runner) ─────────────────────────────────────────
  oci:
    name: Build and verify OCI images
    needs: enclave
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      BAKE_METADATA_FILE: ${{ github.workspace }}/.bake-metadata.json
    outputs:
      artifact_manifest: ${{ steps.partial.outputs.actual }}
    permissions:
      contents: read
      packages: write # push OCI images to ghcr.io on push events
      pull-requests: write # surfaced through artifact-manifest job; declared here for parity

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install recomputed server-enclave.json
        env:
          SERVER_ENCLAVE: ${{ needs.enclave.outputs.server_enclave }}
        run: |
          # Overwrite the committed file with the authoritative value the
          # `enclave` job just derived from tinfoil-config.yml. The cli OCI
          # build below COPYs `releases/` into its build context, so this
          # makes the cli embed the correct measurement regardless of
          # whether the committed file was current.
          printf '%s\n' "$SERVER_ENCLAVE" > releases/trust/server-enclave.json

      - name: Set up Docker Buildx
        # v* tag (release) builds skip the GHA cache entirely so Sigstore-
        # attested artifacts come from a clean compile (see "Build OCI
        # images" below). PR/main builds use type=gha cache, which is
        # branch-scoped — PR branches cannot write the main scope.
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0 # zizmor: ignore[cache-poisoning]
        with:
          version: v0.31.1
          platforms: linux/amd64
          driver-opts: |
            image=moby/buildkit:v0.28.0@sha256:60bfb07e39a6e524e78e6c4723114902c6b61ee36714493e357e39861bea753b

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        if: github.event_name == 'push'
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          REGISTRY="ghcr.io/${OWNER}"
          SHORT_SHA=$(echo "${COMMIT_SHA}" | cut -c1-7)

          TAGS="sha-${SHORT_SHA}"

          if [ "${GIT_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},main"
          elif [[ "${GIT_REF}" == refs/tags/v* ]]; then
            VERSION="${GIT_REF#refs/tags/}"
            TAGS="${TAGS},${VERSION}"
          fi

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build OCI images
        env:
          REGISTRY: ${{ steps.tags.outputs.registry || '' }}
          TAGS: ${{ steps.tags.outputs.tags || 'dev' }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          PUSH_FLAG=""
          if [ "${EVENT_NAME}" = "push" ]; then
            PUSH_FLAG="--push"
          fi

          # Skip the GHA cache for v* release tags so Sigstore-attested
          # artifacts are built clean and don't depend on cache state
          # written by other refs.
          CACHE_ARGS=()
          if [[ "${GIT_REF}" != refs/tags/v* ]]; then
            CACHE_ARGS=(--set "*.cache-from=type=gha" --set "*.cache-to=type=gha,mode=max")
          fi

          ./scripts/artifact-manifest.sh build \
            ${PUSH_FLAG} \
            --metadata-file "${BAKE_METADATA_FILE}" \
            "${CACHE_ARGS[@]}"

      - name: Record OCI artifact manifest
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PUSH_FLAG=""
          if [ "${EVENT_NAME}" = "push" ]; then
            PUSH_FLAG="--push"
          fi
          echo "actual<<EOF" >> "$GITHUB_OUTPUT"
          ./scripts/artifact-manifest.sh print ${PUSH_FLAG} --metadata-file "${BAKE_METADATA_FILE}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        id: partial

      - name: Verify OCI artifact subset
        id: verify
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PUSH_FLAG=""
          if [ "${EVENT_NAME}" = "push" ]; then
            PUSH_FLAG="--push"
          fi
          if ./scripts/artifact-manifest.sh verify ${PUSH_FLAG} --metadata-file "${BAKE_METADATA_FILE}" --manifest artifact-manifest.json; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug build metadata
        if: steps.verify.outputs.match == 'false'
        run: |
          echo "=== Builder info ==="
          docker buildx version
          docker buildx inspect --bootstrap 2>/dev/null | head -20

          echo ""
          echo "=== Bake metadata ==="
          jq . "${BAKE_METADATA_FILE}"

          echo ""
          echo "=== Committed manifest ==="
          jq . artifact-manifest.json

  # ── Apple (expensive macOS runner) ───────────────────────────────────────────
  # This uses https://github.com/khoi/sand to provision a runner from a known image:
  # ghcr.io/cirruslabs/macos-tahoe-xcode@sha256:a914e5b3fc1197d61832009778a77ca30717314fd32702cfdf90a42f2c279ea3
  apple:
    name: Apple builds
    needs: enclave
    runs-on: self-hosted # zizmor: ignore[self-hosted-runner] -- macOS Nix CLI universal-binary build requires an Apple-silicon runner
    timeout-minutes: 30
    # Only main and v* tag pushes acquire the Cachix write token, gated by
    # the branch-restricted `cachix-write` environment in repo settings.
    # Other runs (PRs, schedule, dispatch) get no environment and pull
    # anonymously from the public Cachix cache.
    environment: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) && 'cachix-write' || '' }}
    outputs:
      artifact_manifest: ${{ steps.partial.outputs.actual }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install recomputed server-enclave.json
        env:
          SERVER_ENCLAVE: ${{ needs.enclave.outputs.server_enclave }}
        run: |
          # Overwrite the committed file with the authoritative value the
          # `enclave` job derived from tinfoil-config.yml. The flake's
          # source filter picks up the working-tree content (the file is
          # git-tracked), so this makes the macOS cli embed the correct
          # measurement regardless of whether the committed file was current.
          printf '%s\n' "$SERVER_ENCLAVE" > releases/trust/server-enclave.json

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            sandbox = true
            sandbox-fallback = false

      - name: Configure Nix binary cache
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: eidola
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build macOS CLI universal binary
        id: partial
        run: |
          ./scripts/artifact-manifest.sh build-macos \
            --output /tmp/macos-artifact-manifest.json

          echo "actual<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/macos-artifact-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  artifact-manifest:
    name: Verify artifact manifest
    needs:
      - rust-checks
      - oci
      - apple
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write # post REQUEST_CHANGES review when manifest is stale

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        # save-if scopes writes to main; this job only verifies the manifest,
        # it does not produce any published artifact.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache CVM artifacts
        # CVM kernel/initrd downloads are Sigstore-verified by the
        # --verify-attestations flag below, so a poisoned cache is rejected
        # at verification time.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning]
        with:
          path: ~/.cache/eidola/cvm
          key: cvm-${{ hashFiles('tinfoil-config.yml') }}

      - name: Materialize partial manifests
        env:
          OCI_MANIFEST: ${{ needs.oci.outputs.artifact_manifest }}
          APPLE_MANIFEST: ${{ needs.apple.outputs.artifact_manifest }}
        run: |
          printf '%s' "$OCI_MANIFEST" > /tmp/oci-artifact-manifest.json
          printf '%s' "$APPLE_MANIFEST" > /tmp/apple-artifact-manifest.json

      - name: Verify full artifact manifest
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ./scripts/artifact-manifest.sh verify-full \
            --partial /tmp/oci-artifact-manifest.json \
            --partial /tmp/apple-artifact-manifest.json \
            --manifest artifact-manifest.json \
            --output /tmp/artifact-manifest-actual.json \
            --server-enclave-output /tmp/server-enclave-actual.json \
            --verify-attestations; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

          # Each cli build in this run was compiled against the recomputed
          # (authoritative) server-enclave.json — the `enclave` job above
          # produces it and the `oci`/`apple` jobs overwrite the committed
          # file before building — so both suggestion files below are
          # always internally consistent: a developer committing them
          # verbatim is guaranteed to pass the next CI run.
          echo "manifest_actual<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/artifact-manifest-actual.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "server_enclave_actual<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/server-enclave-actual.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Request manifest update (PR only)
        if: steps.verify.outputs.match == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MANIFEST_ACTUAL: ${{ steps.verify.outputs.manifest_actual }}
          SERVER_ENCLAVE_ACTUAL: ${{ steps.verify.outputs.server_enclave_actual }}
        run: |
          MANIFEST_FORMATTED=$(echo "$MANIFEST_ACTUAL" | jq -S '.')
          SERVER_ENCLAVE_FORMATTED=$(echo "$SERVER_ENCLAVE_ACTUAL" | jq -S '.')

          # Post a REQUEST_CHANGES review with both expected files in the
          # body. The cli builds in this run were compiled against the
          # *recomputed* `server-enclave.json` (CI overwrites the committed
          # file before building), so both suggestions are guaranteed
          # internally consistent: committing them as-is will make the
          # next CI run pass. We avoid line-level suggestions because
          # GitHub's UI cannot apply them when the diff contains
          # deleted-and-replaced lines, which happens on virtually every
          # manifest update.
          BODY=$(printf '**Artifact Manifest Update Required**\n\nThe built OCI/macOS artifacts or recomputed enclave measurements differ from what is committed. Run `just update-manifest` on macOS to regenerate, or commit both files below verbatim (the cli digests were built against the recomputed server-enclave so they are guaranteed consistent).\n\n`releases/trust/server-enclave.json`:\n\n```json\n%s\n```\n\n`artifact-manifest.json`:\n\n```json\n%s\n```' "$SERVER_ENCLAVE_FORMATTED" "$MANIFEST_FORMATTED")

          jq -n \
            --arg body "$BODY" \
            '{
              event: "REQUEST_CHANGES",
              body: $body
            }' | gh api --silent -X POST \
              "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --input -

      - name: Fail on manifest mismatch
        if: steps.verify.outputs.match == 'false'
        run: exit 1
