name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  # ── Rust checks (cheap ubuntu runner) ────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: rust-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check OpenAPI spec freshness
        run: |
          cargo run -q -p generate-openapi > /tmp/openapi-generated.json
          if ! diff /tmp/openapi-generated.json crates/eidolons-server/openapi.json; then
            echo ""
            echo "ERROR: Committed OpenAPI spec doesn't match generated one!"
            echo "Run: just update-openapi"
            exit 1
          fi

  # ── OCI images (cheap ubuntu runner) ─────────────────────────────────────────
  oci:
    name: Build and verify OCI images
    needs: rust-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: v0.31.1
          platforms: linux/amd64
          driver-opts: |
            image=moby/buildkit:v0.28.0@sha256:60bfb07e39a6e524e78e6c4723114902c6b61ee36714493e357e39861bea753b

      - name: Build OCI images
        run: |
          ./scripts/artifact-manifest.sh build --metadata-file /tmp/bake-metadata.json

      - name: Verify artifact manifest
        id: verify
        run: |
          echo "actual<<EOF" >> "$GITHUB_OUTPUT"
          ./scripts/artifact-manifest.sh print --metadata-file /tmp/bake-metadata.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if ./scripts/artifact-manifest.sh verify --metadata-file /tmp/bake-metadata.json --manifest artifact-manifest.json; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Suggest manifest update (PR only)
        if: steps.verify.outputs.match == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTUAL: ${{ steps.verify.outputs.actual }}
        run: |
          # Write the actual manifest to a temp file for the suggestion
          SUGGESTION=$(echo "$ACTUAL" | jq '.')

          jq -n \
            --arg actual "$SUGGESTION" \
            '{
              event: "REQUEST_CHANGES",
              body: "**Artifact Manifest Update Required**\n\nThe OCI images built from this PR produce different digests than what is committed in `artifact-manifest.json`.\n\nRun `just update-manifest` to regenerate it.",
              comments: [{
                path: "artifact-manifest.json",
                line: 1,
                body: "Artifact manifest is out of date. Run `just update-manifest` to update."
              }]
            }' | gh api --silent -X POST \
              "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
              --input -

      - name: Debug image structure
        if: steps.verify.outputs.match == 'false'
        run: |
          echo "=== Builder info ==="
          docker buildx version
          docker buildx inspect --bootstrap 2>/dev/null | head -20

          for IMAGE in eidolons-server eidolons-cli eidolons-postgres; do
            echo ""
            echo "=============== $IMAGE ==============="
            DIR="/tmp/${IMAGE}-debug"
            mkdir -p "$DIR"
            docker save "${IMAGE}:dev" | tar -xf - -C "$DIR"

            MANIFEST_DIGEST=$(jq -r '.manifests[0].digest' "$DIR/index.json" | cut -d: -f2)

            echo "=== Index ==="
            jq . "$DIR/index.json"

            echo "=== Manifest (sha256:${MANIFEST_DIGEST:0:12}...) ==="
            jq . "$DIR/blobs/sha256/$MANIFEST_DIGEST"

            CONFIG_DIGEST=$(jq -r '.config.digest' "$DIR/blobs/sha256/$MANIFEST_DIGEST" | cut -d: -f2)
            echo "=== Config (sha256:${CONFIG_DIGEST:0:12}...) ==="
            jq . "$DIR/blobs/sha256/$CONFIG_DIGEST"

            echo "=== Layer listing ==="
            jq -r '.layers[] | "\(.digest) \(.mediaType)"' "$DIR/blobs/sha256/$MANIFEST_DIGEST" | while read -r LAYER MEDIA; do
              HASH="${LAYER#sha256:}"
              SIZE=$(stat -c%s "$DIR/blobs/sha256/$HASH" 2>/dev/null || stat -f%z "$DIR/blobs/sha256/$HASH")
              echo "  $LAYER  size=$SIZE  type=$MEDIA"
              echo "  First 20 tar entries:"
              if echo "$MEDIA" | grep -q gzip; then
                gzip -dc "$DIR/blobs/sha256/$HASH" | tar -tf - 2>/dev/null | head -20 | sed 's/^/    /'
              else
                tar -tf "$DIR/blobs/sha256/$HASH" 2>/dev/null | head -20 | sed 's/^/    /'
              fi
            done
          done

      - name: Fail on manifest mismatch
        if: steps.verify.outputs.match == 'false'
        run: exit 1

      - name: Log in to GHCR
        if: steps.verify.outputs.match == 'true' && github.event_name == 'push'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        if: steps.verify.outputs.match == 'true' && github.event_name == 'push'
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          REGISTRY="ghcr.io/${OWNER}"
          SHORT_SHA=$(echo "${COMMIT_SHA}" | cut -c1-7)

          TAGS="sha-${SHORT_SHA}"

          if [ "${GIT_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},main"
          elif [[ "${GIT_REF}" == refs/tags/v* ]]; then
            VERSION="${GIT_REF#refs/tags/}"
            TAGS="${TAGS},${VERSION}"
          fi

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Push images to GHCR
        if: steps.verify.outputs.match == 'true' && github.event_name == 'push'
        env:
          REGISTRY: ${{ steps.tags.outputs.registry }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          IFS=',' read -ra TAG_LIST <<< "${TAGS}"

          for IMAGE in eidolons-server eidolons-cli eidolons-postgres; do
            for TAG in "${TAG_LIST[@]}"; do
              docker tag "${IMAGE}:dev" "${REGISTRY}/${IMAGE}:${TAG}"
              docker push "${REGISTRY}/${IMAGE}:${TAG}"
            done
          done

  # ── Apple (expensive macOS runner) ───────────────────────────────────────────
  apple:
    name: Apple builds
    needs: rust-checks
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4 # v3.17.0

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v8
        with:
          # Without a paid account, the action will perform an unnecessary check and issue a warning
          # unless this is set to false
          use-flakehub: false
          source-url: https://github.com/mike-marcacci/magic-nix-cache/releases/download/v0.0.1-skip-upstream-test/magic-nix-cache-closure-ARM64-macOS.xz

      - name: Check Swift formatting
        run: nix build '.#checks.aarch64-darwin.swift-formatting' --show-trace

      - name: Check Swift bindings freshness
        run: nix build '.#checks.aarch64-darwin.swift-bindings-current' --show-trace

      - name: Build macOS app
        run: nix build '.#eidolons-macos-app' --show-trace

      - name: Build macOS CLI (universal binary)
        run: nix build '.#eidolons-cli-macos-universal' --show-trace

      - name: Run Swift tests
        run: |
          # Build the XCFramework and update the local path for SPM
          nix run '.#update-eidolons-shared-swift-xcframework'

          # Run Swift tests for shared core
          ( cd crates/eidolons-shared && swift test )

          # Run Swift tests for macOS app
          ( cd apps/macos && swift test )
