# Generate and attest the Tinfoil deployment manifest.
#
# Tinfoil's verification chain works as follows:
#   1. The pri-build-action recomputes measurements from tinfoil-config.yml,
#      serving as an independent cross-check against our artifact-manifest.json
#      (whose measurements are computed by measure-enclave and verified by CI).
#   2. A verification step ensures both implementations agree.
#   3. The deployment manifest is attested to Sigstore via actions/attest,
#      producing a transparency log entry on Rekor.
#   4. A GitHub release is created with the manifest + its SHA-256 hash.
#   5. Tinfoil's verifier (tinfoil-go) fetches tinfoil.hash from the release,
#      retrieves the Sigstore bundle from the GitHub Attestations API, verifies
#      the OIDC identity + artifact digest, then extracts the measurements and
#      compares them against the live enclave's hardware attestation report.

name: Tinfoil Build

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Attest and release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and release
        uses: tinfoilsh/measure-image-action@9733d724326dd6b476335ec513210861894d4cb2 # v0.8.2
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify measurements match artifact-manifest.json
        run: |
          # Cross-check: the action recomputed measurements from tinfoil-config.yml
          # using Python/sevsnpmeasure. Our artifact-manifest.json was computed by
          # measure-enclave (Rust/sev crate) and verified by CI. They must agree.
          EXPECTED_SNP=$(jq -r '.enclave.snp_measurement' artifact-manifest.json)
          ACTUAL_SNP=$(jq -r '.snp_measurement' output/tinfoil-deployment.json)

          EXPECTED_CMDLINE=$(jq -r '.enclave.cmdline' artifact-manifest.json)
          ACTUAL_CMDLINE=$(jq -r '.cmdline' output/tinfoil-deployment.json)

          EXPECTED_RTMR1=$(jq -r '.enclave.tdx_measurement.rtmr1' artifact-manifest.json)
          ACTUAL_RTMR1=$(jq -r '.tdx_measurement.rtmr1' output/tinfoil-deployment.json)

          EXPECTED_RTMR2=$(jq -r '.enclave.tdx_measurement.rtmr2' artifact-manifest.json)
          ACTUAL_RTMR2=$(jq -r '.tdx_measurement.rtmr2' output/tinfoil-deployment.json)

          FAIL=0
          if [ "$EXPECTED_SNP" != "$ACTUAL_SNP" ]; then
            echo "::error::SNP measurement mismatch: expected $EXPECTED_SNP, got $ACTUAL_SNP"
            FAIL=1
          fi
          if [ "$EXPECTED_CMDLINE" != "$ACTUAL_CMDLINE" ]; then
            echo "::error::Cmdline mismatch: expected $EXPECTED_CMDLINE, got $ACTUAL_CMDLINE"
            FAIL=1
          fi
          if [ "$EXPECTED_RTMR1" != "$ACTUAL_RTMR1" ]; then
            echo "::error::TDX RTMR1 mismatch: expected $EXPECTED_RTMR1, got $ACTUAL_RTMR1"
            FAIL=1
          fi
          if [ "$EXPECTED_RTMR2" != "$ACTUAL_RTMR2" ]; then
            echo "::error::TDX RTMR2 mismatch: expected $EXPECTED_RTMR2, got $ACTUAL_RTMR2"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Measurement cross-check failed. Our measure-enclave and Tinfoil's action disagree."
            exit 1
          fi

          echo "All measurements match between artifact-manifest.json and tinfoil-deployment.json"
