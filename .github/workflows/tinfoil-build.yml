# Tag-triggered release pipeline.
#
# Two responsibilities, one workflow:
#
# 1. **Tinfoil deployment manifest** (driven by the Tinfoil action).
#    Tinfoil's closed-source deployment system requires this workflow's
#    file to be named `tinfoil-build.yml` — do not rename. The action
#    recomputes enclave measurements from `tinfoil-config.yml` using
#    Python/sevsnpmeasure (independent of our Rust `measure-enclave`),
#    attests the resulting deployment manifest to Sigstore via
#    `actions/attest` (producing a Rekor transparency log entry), and
#    creates the GitHub release with the manifest + its SHA-256 hash.
#    Tinfoil's verifier (`tinfoil-go`) consumes that release.
#
# 2. **Eidola release signing** (the cosign / upload steps below).
#    `cosign sign-blob` signs `artifact-manifest.json` keyless via the
#    workflow's Fulcio OIDC identity (matching the
#    `EXPECTED_CI_IDENTITY_PATTERN` baked into the client trust root).
#    The signed bundle + the manifest itself are uploaded as release
#    assets so clients can verify them during self-update. The release is
#    **not** marked latest here — the engineer's release-tool does that
#    after their human attestation has been signed and uploaded.

name: Tinfoil Build

on:
  push:
    tags:
      - "v*"

# Each tag run is unique and produces a release; serialize rather than cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Attest and release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write # create the GitHub release for the tag
      id-token: write # mint the OIDC token used for Sigstore attestation
      attestations: write # publish the Sigstore attestation via actions/attest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build and release
        uses: tinfoilsh/measure-image-action@e9967c4a2dd60bacc7cce9e4315c5ebcd46118e9 # v0.9.2
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify measurements match artifact-manifest.json
        run: |
          # Cross-check: the action recomputed measurements from tinfoil-config.yml
          # using Python/sevsnpmeasure. Our artifact-manifest.json was computed by
          # measure-enclave (Rust/sev crate) and verified by CI. They must agree.
          EXPECTED_SNP=$(jq -r '.enclave.snp_measurement' artifact-manifest.json)
          ACTUAL_SNP=$(jq -r '.snp_measurement' output/tinfoil-deployment.json)

          EXPECTED_CMDLINE=$(jq -r '.enclave.cmdline' artifact-manifest.json)
          ACTUAL_CMDLINE=$(jq -r '.cmdline' output/tinfoil-deployment.json)

          EXPECTED_RTMR1=$(jq -r '.enclave.tdx_measurement.rtmr1' artifact-manifest.json)
          ACTUAL_RTMR1=$(jq -r '.tdx_measurement.rtmr1' output/tinfoil-deployment.json)

          EXPECTED_RTMR2=$(jq -r '.enclave.tdx_measurement.rtmr2' artifact-manifest.json)
          ACTUAL_RTMR2=$(jq -r '.tdx_measurement.rtmr2' output/tinfoil-deployment.json)

          FAIL=0
          if [ "$EXPECTED_SNP" != "$ACTUAL_SNP" ]; then
            echo "::error::SNP measurement mismatch: expected $EXPECTED_SNP, got $ACTUAL_SNP"
            FAIL=1
          fi
          if [ "$EXPECTED_CMDLINE" != "$ACTUAL_CMDLINE" ]; then
            echo "::error::Cmdline mismatch: expected $EXPECTED_CMDLINE, got $ACTUAL_CMDLINE"
            FAIL=1
          fi
          if [ "$EXPECTED_RTMR1" != "$ACTUAL_RTMR1" ]; then
            echo "::error::TDX RTMR1 mismatch: expected $EXPECTED_RTMR1, got $ACTUAL_RTMR1"
            FAIL=1
          fi
          if [ "$EXPECTED_RTMR2" != "$ACTUAL_RTMR2" ]; then
            echo "::error::TDX RTMR2 mismatch: expected $EXPECTED_RTMR2, got $ACTUAL_RTMR2"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Measurement cross-check failed. Our measure-enclave and Tinfoil's action disagree."
            exit 1
          fi

          echo "All measurements match between artifact-manifest.json and tinfoil-deployment.json"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifact-manifest.json (Fulcio keyless via OIDC)
        run: |
          # Produces a Sigstore bundle binding the workflow's Fulcio OIDC
          # identity to sha256(artifact-manifest.json), with a Rekor
          # inclusion proof embedded. The client trust root pins both the
          # OIDC issuer and the workflow path (EXPECTED_CI_IDENTITY_PATTERN);
          # any cert SAN that doesn't match is rejected on verification.
          cosign sign-blob \
            artifact-manifest.json \
            --bundle artifact-manifest.json.sigstore \
            --yes

          # Sanity: bundle exists and is non-empty.
          test -s artifact-manifest.json.sigstore

      - name: Upload signed manifest to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            artifact-manifest.json \
            artifact-manifest.json.sigstore \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
