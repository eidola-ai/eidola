name: CLA Check

on:
  pull_request:
    branches: [main, next]

# Cancel superseded runs when a PR branch is updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  cla:
    name: Verify CLA signatures
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # post/minimize CLA-status comment on the PR
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Fetch enough history to find the merge base with the target branch.
          fetch-depth: 0
          persist-credentials: false

      - name: Check CLA
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: .github/scripts/check-cla.sh "origin/${BASE_REF}"
