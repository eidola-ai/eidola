name: CLA Check

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  cla:
    name: Verify CLA signatures
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch enough history to find the merge base with the target branch.
          fetch-depth: 0

      - name: Check CLA
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/check-cla.sh "origin/${{ github.base_ref }}"
