name: Update Tinfoil measurements

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-measurements:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch latest Tinfoil release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="tinfoilsh/confidential-model-router"

          TAG=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest release: ${TAG}"

          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "tinfoil-deployment.json" \
            --pattern "tinfoil.hash" \
            --dir /tmp

          MEASUREMENT=$(jq -r '.snp_measurement' /tmp/tinfoil-deployment.json)
          echo "measurement=${MEASUREMENT}" >> "$GITHUB_OUTPUT"
          echo "SNP measurement: ${MEASUREMENT}"

          BUILT_AT=$(jq -r '.hashes.built_at // empty' /tmp/tinfoil-deployment.json)
          echo "built_at=${BUILT_AT}" >> "$GITHUB_OUTPUT"

          ARTIFACT_HASH=$(tr -d '[:space:]' < /tmp/tinfoil.hash)
          echo "artifact_hash=${ARTIFACT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Fetch sigstore attestation
        id: sigstore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="tinfoilsh/confidential-model-router"
          DIGEST="${{ steps.release.outputs.artifact_hash }}"

          LOG_INDEX=$(gh api "repos/${REPO}/attestations/sha256:${DIGEST}" \
            --jq '.attestations[0].bundle.verificationMaterial.tlogEntries[0].logIndex')
          echo "log_index=${LOG_INDEX}" >> "$GITHUB_OUTPUT"
          echo "Rekor log index: ${LOG_INDEX}"

      - name: Check if measurement is already known
        id: check
        run: |
          MEASUREMENT="${{ steps.release.outputs.measurement }}"
          if grep -qF "${MEASUREMENT}" crates/eidolons-server/src/measurements.rs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Measurement already present"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New measurement detected"
          fi

      - name: Update measurements.rs
        if: steps.check.outputs.changed == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          MEASUREMENT: ${{ steps.release.outputs.measurement }}
          BUILT_AT: ${{ steps.release.outputs.built_at }}
          ARTIFACT_HASH: ${{ steps.release.outputs.artifact_hash }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          FILE="crates/eidolons-server/src/measurements.rs"

          # Extract current CURRENT measurement before overwriting
          PREV=$(git show HEAD:"${FILE}" | grep -oP '[a-f0-9]{96}' | head -1 || true)

          # Extract previous CURRENT's doc comments for demotion
          PREV_TAG=$(git show HEAD:"${FILE}" | grep -oP '(?<=/// Tinfoil inference enclave ).*' | head -1 || true)

          # Write the new file
          {
            echo '//! Allowed code measurements for Tinfoil'\''s inference enclave.'
            echo '//!'
            echo '//! Updated by CI when Tinfoil publishes new enclave builds.'
            echo '//! At least two entries for rolling deploys (current + previous).'
            echo '//!'
            echo '//! Source repo: tinfoilsh/confidential-model-router'
            echo ''
            echo "/// Tinfoil inference enclave ${TAG}"
            echo "/// Built: ${BUILT_AT}"
            echo "/// Artifact digest: sha256:${ARTIFACT_HASH}"
            echo "/// Rekor log index: ${LOG_INDEX}"
            echo "/// Sigstore: https://search.sigstore.dev/?logIndex=${LOG_INDEX}"
            echo "/// GitHub: https://github.com/tinfoilsh/confidential-model-router/releases/tag/${TAG}"
            echo 'const CURRENT: &str ='
            echo "    \"${MEASUREMENT}\";"

            if [ -n "${PREV}" ] && [ "${PREV}" != "${MEASUREMENT}" ]; then
              echo ''
              if [ -n "${PREV_TAG}" ]; then
                echo "/// Previous: ${PREV_TAG}"
              fi
              echo 'const PREVIOUS: &str ='
              echo "    \"${PREV}\";"
            fi

            echo ''
            echo 'pub const ALLOWED: &[&str] = &['
            echo '    CURRENT,'
            if [ -n "${PREV}" ] && [ "${PREV}" != "${MEASUREMENT}" ]; then
              echo '    PREVIOUS,'
            fi
            echo '];'
          } > "${FILE}"

          echo "Updated ${FILE}:"
          cat "${FILE}"

      - name: Check for existing PR
        if: steps.check.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          BRANCH="measurements/${TAG}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Branch ${BRANCH} already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          MEASUREMENT: ${{ steps.release.outputs.measurement }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          BRANCH="measurements/${TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add crates/eidolons-server/src/measurements.rs
          git commit -m "Update Tinfoil enclave measurement to ${TAG}"
          git push -u origin "${BRANCH}"

          SHORT="${MEASUREMENT:0:16}…${MEASUREMENT: -16}"
          RELEASE_URL="https://github.com/tinfoilsh/confidential-model-router/releases/tag/${TAG}"
          SIGSTORE_URL="https://search.sigstore.dev/?logIndex=${LOG_INDEX}"

          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Updates the allowed SNP measurement for the Tinfoil inference enclave to match release [\`${TAG}\`](${RELEASE_URL}).

          **New measurement:** \`${SHORT}\`
          **Rekor transparency log:** [${LOG_INDEX}](${SIGSTORE_URL})

          ## Verification

          The measurement was extracted from \`tinfoil-deployment.json\` in the GitHub release.
          The artifact's sigstore attestation was looked up via the GitHub attestation API.

          - [ ] Confirm measurement matches [Tinfoil's published value](${RELEASE_URL})
          - [ ] CI passes
          EOF

          gh pr create \
            --title "Update Tinfoil enclave measurement to ${TAG}" \
            --body-file /tmp/pr-body.md \
            --base main
