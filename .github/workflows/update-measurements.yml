name: Update Tinfoil measurements

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

# All writes go through the minted App token below; GITHUB_TOKEN only ever
# reads (the public upstream release, the attestation API, this repo's refs).
permissions:
  contents: read

concurrency:
  # Serialize runs so two overlapping schedules can't race to create the same
  # measurements/<tag> branch or open duplicate PRs.
  group: update-measurements
  cancel-in-progress: false

jobs:
  check-measurements:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Gated by the `update-measurements` Environment: a deployment-branch policy
    # restricted to the default branch (`main`). Scheduled / dispatched runs
    # execute the default-branch copy of this workflow, so only those runs can
    # read the App secrets. This is what scopes the App credentials to this
    # workflow running from `main`.
    environment: update-measurements
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MEASUREMENT_APP_ID }}
          private-key: ${{ secrets.MEASUREMENT_APP_PRIVATE_KEY }}
          # Least-privilege installation token. The App must be granted at least
          # these permissions on this repo; nothing else is requested, so the
          # token can do nothing beyond committing the measurement file and
          # opening its PR.
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout next
        # Measurement updates branch from and target `next` (the integration
        # trunk), even though the scheduled run executes from `main`. We never
        # push over git — the commit is created through the Contents API below —
        # so no git credentials need to be persisted into .git/config.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: next
          persist-credentials: false

      - name: Fetch latest Tinfoil release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="tinfoilsh/confidential-model-router"

          TAG=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest release: ${TAG}"

          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "tinfoil-deployment.json" \
            --pattern "tinfoil.hash" \
            --dir /tmp

          SNP=$(jq -r '.snp_measurement' /tmp/tinfoil-deployment.json)
          RTMR1=$(jq -r '.tdx_measurement.rtmr1' /tmp/tinfoil-deployment.json)
          RTMR2=$(jq -r '.tdx_measurement.rtmr2' /tmp/tinfoil-deployment.json)
          if [ -z "${SNP}" ] || [ "${SNP}" = "null" ] \
             || [ -z "${RTMR1}" ] || [ "${RTMR1}" = "null" ] \
             || [ -z "${RTMR2}" ] || [ "${RTMR2}" = "null" ]; then
            echo "tinfoil-deployment.json is missing snp_measurement or tdx_measurement" >&2
            exit 1
          fi
          echo "snp=${SNP}" >> "$GITHUB_OUTPUT"
          echo "rtmr1=${RTMR1}" >> "$GITHUB_OUTPUT"
          echo "rtmr2=${RTMR2}" >> "$GITHUB_OUTPUT"
          echo "SNP measurement: ${SNP}"
          echo "TDX RTMR1: ${RTMR1}"
          echo "TDX RTMR2: ${RTMR2}"

          BUILT_AT=$(jq -r '.hashes.built_at // empty' /tmp/tinfoil-deployment.json)
          echo "built_at=${BUILT_AT}" >> "$GITHUB_OUTPUT"

          ARTIFACT_HASH=$(tr -d '[:space:]' < /tmp/tinfoil.hash)
          echo "artifact_hash=${ARTIFACT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Fetch sigstore attestation
        id: sigstore
        env:
          GH_TOKEN: ${{ github.token }}
          DIGEST: ${{ steps.release.outputs.artifact_hash }}
        run: |
          REPO="tinfoilsh/confidential-model-router"

          LOG_INDEX=$(gh api "repos/${REPO}/attestations/sha256:${DIGEST}" \
            --jq '.attestations[0].bundle.verificationMaterial.tlogEntries[0].logIndex')
          echo "log_index=${LOG_INDEX}" >> "$GITHUB_OUTPUT"
          echo "Rekor log index: ${LOG_INDEX}"

      - name: Check if measurements are already known
        id: check
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          FILE="releases/trust/tinfoil-enclaves.json"
          if jq -e --arg tag "${TAG}" '.allowed | any(.git_tag == $tag)' "${FILE}" >/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already present in ${FILE}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} not yet present in ${FILE}"
          fi

      - name: Update tinfoil-enclaves.json
        if: steps.check.outputs.changed == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          SNP: ${{ steps.release.outputs.snp }}
          RTMR1: ${{ steps.release.outputs.rtmr1 }}
          RTMR2: ${{ steps.release.outputs.rtmr2 }}
          BUILT_AT: ${{ steps.release.outputs.built_at }}
          ARTIFACT_HASH: ${{ steps.release.outputs.artifact_hash }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          FILE="releases/trust/tinfoil-enclaves.json"

          # Prepend the new release and keep the most recent two entries
          # (current + previous, for rolling deploys). The existing block
          # for an earlier release is preserved verbatim so its provenance
          # metadata (built_at, artifact_digest, rekor_log_index) survives.
          jq \
            --arg tag "${TAG}" \
            --arg built_at "${BUILT_AT}" \
            --arg artifact_digest "sha256:${ARTIFACT_HASH}" \
            --argjson rekor_log_index "${LOG_INDEX}" \
            --arg snp "${SNP}" \
            --arg rtmr1 "${RTMR1}" \
            --arg rtmr2 "${RTMR2}" \
            '
            .allowed = (
              [{
                git_tag: $tag,
                built_at: $built_at,
                artifact_digest: $artifact_digest,
                rekor_log_index: $rekor_log_index,
                snp_measurement: $snp,
                tdx_measurement: { rtmr1: $rtmr1, rtmr2: $rtmr2 }
              }] + (.allowed | map(select(.git_tag != $tag)))
            )
            | .allowed |= .[:2]
            ' "${FILE}" > "${FILE}.new"
          mv "${FILE}.new" "${FILE}"

          echo "Updated ${FILE}:"
          cat "${FILE}"

      - name: Check for existing branch
        if: steps.check.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          BRANCH="measurements/${TAG}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Branch ${BRANCH} already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open pull request
        if: steps.check.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        env:
          # App token: produces a *verified* commit attributed to the App bot
          # (the Contents API signs commits made through it) and ensures the
          # opened PR triggers downstream CI (events from GITHUB_TOKEN do not).
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag }}
          SNP: ${{ steps.release.outputs.snp }}
          RTMR1: ${{ steps.release.outputs.rtmr1 }}
          RTMR2: ${{ steps.release.outputs.rtmr2 }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          set -euo pipefail

          FILE="releases/trust/tinfoil-enclaves.json"
          BRANCH="measurements/${TAG}"

          # Base the new branch on the exact `next` head we checked out, and
          # capture the current (pre-edit) blob SHA the Contents API needs to
          # replace the file.
          BASE_SHA=$(git rev-parse HEAD)
          BASE_BLOB_SHA=$(git rev-parse "HEAD:${FILE}")

          # Create the branch ref pointing at next's head (no new commit yet).
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/heads/${BRANCH}" \
            -f "sha=${BASE_SHA}"

          # Create the single measurement commit via the Contents API. Using the
          # App token, GitHub signs it (Verified) and attributes author and
          # committer to the App bot automatically — no git identity to look up.
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${FILE}" \
            -f "message=Update Tinfoil enclave measurements to ${TAG}" \
            -f "content=$(base64 -w0 "${FILE}")" \
            -f "branch=${BRANCH}" \
            -f "sha=${BASE_BLOB_SHA}"

          SHORT_SNP="${SNP:0:16}…${SNP: -16}"
          SHORT_RTMR1="${RTMR1:0:16}…${RTMR1: -16}"
          SHORT_RTMR2="${RTMR2:0:16}…${RTMR2: -16}"
          RELEASE_URL="https://github.com/tinfoilsh/confidential-model-router/releases/tag/${TAG}"
          SIGSTORE_URL="https://search.sigstore.dev/?logIndex=${LOG_INDEX}"

          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Updates the allowed enclave measurements for the Tinfoil inference enclave to match release [\`${TAG}\`](${RELEASE_URL}). Each entry in \`releases/trust/tinfoil-enclaves.json\` pairs SEV-SNP and TDX measurements per release; the server's \`build.rs\` reads this file to generate \`ALLOWED\` at compile time.

          - **SEV-SNP measurement:** \`${SHORT_SNP}\`
          - **TDX RTMR1:** \`${SHORT_RTMR1}\`
          - **TDX RTMR2:** \`${SHORT_RTMR2}\`
          - **Rekor transparency log:** [${LOG_INDEX}](${SIGSTORE_URL})

          ## Verification

          The measurements were extracted from \`tinfoil-deployment.json\` in the GitHub release.
          The artifact's sigstore attestation was looked up via the GitHub attestation API.

          - [ ] Confirm measurements match [Tinfoil's published values](${RELEASE_URL})
          - [ ] CI passes
          EOF

          gh pr create \
            --title "Update Tinfoil enclave measurements to ${TAG}" \
            --body-file /tmp/pr-body.md \
            --head "${BRANCH}" \
            --base next
