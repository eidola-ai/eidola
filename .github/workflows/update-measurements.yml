name: Update Tinfoil measurements

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-measurements:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # This workflow opens a PR via `git push`, which needs the
      # GITHUB_TOKEN persisted into .git/config. Allowed here.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked]

      - name: Fetch latest Tinfoil release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="tinfoilsh/confidential-model-router"

          TAG=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest release: ${TAG}"

          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "tinfoil-deployment.json" \
            --pattern "tinfoil.hash" \
            --dir /tmp

          SNP=$(jq -r '.snp_measurement' /tmp/tinfoil-deployment.json)
          RTMR1=$(jq -r '.tdx_measurement.rtmr1' /tmp/tinfoil-deployment.json)
          RTMR2=$(jq -r '.tdx_measurement.rtmr2' /tmp/tinfoil-deployment.json)
          if [ -z "${SNP}" ] || [ "${SNP}" = "null" ] \
             || [ -z "${RTMR1}" ] || [ "${RTMR1}" = "null" ] \
             || [ -z "${RTMR2}" ] || [ "${RTMR2}" = "null" ]; then
            echo "tinfoil-deployment.json is missing snp_measurement or tdx_measurement" >&2
            exit 1
          fi
          echo "snp=${SNP}" >> "$GITHUB_OUTPUT"
          echo "rtmr1=${RTMR1}" >> "$GITHUB_OUTPUT"
          echo "rtmr2=${RTMR2}" >> "$GITHUB_OUTPUT"
          echo "SNP measurement: ${SNP}"
          echo "TDX RTMR1: ${RTMR1}"
          echo "TDX RTMR2: ${RTMR2}"

          BUILT_AT=$(jq -r '.hashes.built_at // empty' /tmp/tinfoil-deployment.json)
          echo "built_at=${BUILT_AT}" >> "$GITHUB_OUTPUT"

          ARTIFACT_HASH=$(tr -d '[:space:]' < /tmp/tinfoil.hash)
          echo "artifact_hash=${ARTIFACT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Fetch sigstore attestation
        id: sigstore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.release.outputs.artifact_hash }}
        run: |
          REPO="tinfoilsh/confidential-model-router"

          LOG_INDEX=$(gh api "repos/${REPO}/attestations/sha256:${DIGEST}" \
            --jq '.attestations[0].bundle.verificationMaterial.tlogEntries[0].logIndex')
          echo "log_index=${LOG_INDEX}" >> "$GITHUB_OUTPUT"
          echo "Rekor log index: ${LOG_INDEX}"

      - name: Check if measurements are already known
        id: check
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          FILE="releases/trust/tinfoil-enclaves.json"
          if jq -e --arg tag "${TAG}" '.allowed | any(.git_tag == $tag)' "${FILE}" >/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already present in ${FILE}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} not yet present in ${FILE}"
          fi

      - name: Update tinfoil-enclaves.json
        if: steps.check.outputs.changed == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          SNP: ${{ steps.release.outputs.snp }}
          RTMR1: ${{ steps.release.outputs.rtmr1 }}
          RTMR2: ${{ steps.release.outputs.rtmr2 }}
          BUILT_AT: ${{ steps.release.outputs.built_at }}
          ARTIFACT_HASH: ${{ steps.release.outputs.artifact_hash }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          FILE="releases/trust/tinfoil-enclaves.json"

          # Prepend the new release and keep the most recent two entries
          # (current + previous, for rolling deploys). The existing block
          # for an earlier release is preserved verbatim so its provenance
          # metadata (built_at, artifact_digest, rekor_log_index) survives.
          jq \
            --arg tag "${TAG}" \
            --arg built_at "${BUILT_AT}" \
            --arg artifact_digest "sha256:${ARTIFACT_HASH}" \
            --argjson rekor_log_index "${LOG_INDEX}" \
            --arg snp "${SNP}" \
            --arg rtmr1 "${RTMR1}" \
            --arg rtmr2 "${RTMR2}" \
            '
            .allowed = (
              [{
                git_tag: $tag,
                built_at: $built_at,
                artifact_digest: $artifact_digest,
                rekor_log_index: $rekor_log_index,
                snp_measurement: $snp,
                tdx_measurement: { rtmr1: $rtmr1, rtmr2: $rtmr2 }
              }] + (.allowed | map(select(.git_tag != $tag)))
            )
            | .allowed |= .[:2]
            ' "${FILE}" > "${FILE}.new"
          mv "${FILE}.new" "${FILE}"

          echo "Updated ${FILE}:"
          cat "${FILE}"

      - name: Check for existing PR
        if: steps.check.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          BRANCH="measurements/${TAG}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Branch ${BRANCH} already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          SNP: ${{ steps.release.outputs.snp }}
          RTMR1: ${{ steps.release.outputs.rtmr1 }}
          RTMR2: ${{ steps.release.outputs.rtmr2 }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          BRANCH="measurements/${TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add releases/trust/tinfoil-enclaves.json
          git commit -m "Update Tinfoil enclave measurements to ${TAG}"
          git push -u origin "${BRANCH}"

          SHORT_SNP="${SNP:0:16}…${SNP: -16}"
          SHORT_RTMR1="${RTMR1:0:16}…${RTMR1: -16}"
          SHORT_RTMR2="${RTMR2:0:16}…${RTMR2: -16}"
          RELEASE_URL="https://github.com/tinfoilsh/confidential-model-router/releases/tag/${TAG}"
          SIGSTORE_URL="https://search.sigstore.dev/?logIndex=${LOG_INDEX}"

          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Updates the allowed enclave measurements for the Tinfoil inference enclave to match release [\`${TAG}\`](${RELEASE_URL}). Each entry in \`releases/trust/tinfoil-enclaves.json\` pairs SEV-SNP and TDX measurements per release; the server's \`build.rs\` reads this file to generate \`ALLOWED\` at compile time.

          - **SEV-SNP measurement:** \`${SHORT_SNP}\`
          - **TDX RTMR1:** \`${SHORT_RTMR1}\`
          - **TDX RTMR2:** \`${SHORT_RTMR2}\`
          - **Rekor transparency log:** [${LOG_INDEX}](${SIGSTORE_URL})

          ## Verification

          The measurements were extracted from \`tinfoil-deployment.json\` in the GitHub release.
          The artifact's sigstore attestation was looked up via the GitHub attestation API.

          - [ ] Confirm measurements match [Tinfoil's published values](${RELEASE_URL})
          - [ ] CI passes
          EOF

          gh pr create \
            --title "Update Tinfoil enclave measurements to ${TAG}" \
            --body-file /tmp/pr-body.md \
            --base main
