name: Update Tinfoil measurements

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-measurements:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch latest Tinfoil release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="tinfoilsh/confidential-model-router"

          TAG=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest release: ${TAG}"

          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "tinfoil-deployment.json" \
            --pattern "tinfoil.hash" \
            --dir /tmp

          SNP=$(jq -r '.snp_measurement' /tmp/tinfoil-deployment.json)
          RTMR1=$(jq -r '.tdx_measurement.rtmr1' /tmp/tinfoil-deployment.json)
          RTMR2=$(jq -r '.tdx_measurement.rtmr2' /tmp/tinfoil-deployment.json)
          if [ -z "${SNP}" ] || [ "${SNP}" = "null" ] \
             || [ -z "${RTMR1}" ] || [ "${RTMR1}" = "null" ] \
             || [ -z "${RTMR2}" ] || [ "${RTMR2}" = "null" ]; then
            echo "tinfoil-deployment.json is missing snp_measurement or tdx_measurement" >&2
            exit 1
          fi
          echo "snp=${SNP}" >> "$GITHUB_OUTPUT"
          echo "rtmr1=${RTMR1}" >> "$GITHUB_OUTPUT"
          echo "rtmr2=${RTMR2}" >> "$GITHUB_OUTPUT"
          echo "SNP measurement: ${SNP}"
          echo "TDX RTMR1: ${RTMR1}"
          echo "TDX RTMR2: ${RTMR2}"

          BUILT_AT=$(jq -r '.hashes.built_at // empty' /tmp/tinfoil-deployment.json)
          echo "built_at=${BUILT_AT}" >> "$GITHUB_OUTPUT"

          ARTIFACT_HASH=$(tr -d '[:space:]' < /tmp/tinfoil.hash)
          echo "artifact_hash=${ARTIFACT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Fetch sigstore attestation
        id: sigstore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="tinfoilsh/confidential-model-router"
          DIGEST="${{ steps.release.outputs.artifact_hash }}"

          LOG_INDEX=$(gh api "repos/${REPO}/attestations/sha256:${DIGEST}" \
            --jq '.attestations[0].bundle.verificationMaterial.tlogEntries[0].logIndex')
          echo "log_index=${LOG_INDEX}" >> "$GITHUB_OUTPUT"
          echo "Rekor log index: ${LOG_INDEX}"

      - name: Check if measurements are already known
        id: check
        run: |
          SNP="${{ steps.release.outputs.snp }}"
          RTMR1="${{ steps.release.outputs.rtmr1 }}"
          RTMR2="${{ steps.release.outputs.rtmr2 }}"
          FILE="crates/eidola-server/src/measurements.rs"
          if grep -qF "${SNP}" "${FILE}" \
             && grep -qF "${RTMR1}" "${FILE}" \
             && grep -qF "${RTMR2}" "${FILE}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Measurements already present"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New measurements detected"
          fi

      - name: Update measurements.rs
        if: steps.check.outputs.changed == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          SNP: ${{ steps.release.outputs.snp }}
          RTMR1: ${{ steps.release.outputs.rtmr1 }}
          RTMR2: ${{ steps.release.outputs.rtmr2 }}
          BUILT_AT: ${{ steps.release.outputs.built_at }}
          ARTIFACT_HASH: ${{ steps.release.outputs.artifact_hash }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          FILE="crates/eidola-server/src/measurements.rs"

          # Extract the existing CURRENT block (header comments + struct
          # literal) verbatim from the committed file, so we can re-emit it as
          # the new PREVIOUS block with all build metadata preserved (built_at,
          # artifact digest, Rekor log index, Sigstore + GitHub links). The
          # block starts at `// === CURRENT:` and ends at the closing `},` of
          # the EnclaveMeasurement literal.
          PREV_BLOCK=$(git show HEAD:"${FILE}" | awk '
            /\/\/ === CURRENT:/ { capture=1 }
            capture { print }
            capture && /^        \},[[:space:]]*$/ { exit }
          ')

          # The previous SNP measurement, used only to detect whether the
          # CURRENT release actually changed.
          PREV_SNP=$(printf '%s\n' "${PREV_BLOCK}" \
            | grep -oP '(?<=snp_measurement:\s)"[a-f0-9]+"' | head -1 | tr -d '"' || true)

          HAS_PREV=false
          if [ -n "${PREV_BLOCK}" ] && [ -n "${PREV_SNP}" ] && [ "${PREV_SNP}" != "${SNP}" ]; then
            HAS_PREV=true
          fi

          {
            echo '//! Allowed code measurements for Tinfoil'\''s inference enclave.'
            echo '//!'
            echo '//! Updated by CI when Tinfoil publishes new enclave builds.'
            echo '//! At least two entries for rolling deploys (current + previous).'
            echo '//!'
            echo '//! Each `EnclaveMeasurement` entry pairs the AMD SEV-SNP launch digest with'
            echo '//! the Intel TDX RTMR1/RTMR2 values for a single Tinfoil release. This mirrors'
            echo '//! the shape used in Tinfoil'\''s `tinfoil-deployment.json` and our own'
            echo '//! `artifact-manifest.json`. `tinfoil-verifier` picks the matching field at'
            echo '//! verification time based on the platform that produced the attestation.'
            echo '//!'
            echo '//! Source repo: tinfoilsh/confidential-model-router'
            echo ''
            echo 'use std::sync::LazyLock;'
            echo ''
            echo 'use tinfoil_verifier::{EnclaveMeasurement, TdxMeasurement};'
            echo ''
            echo 'pub static ALLOWED: LazyLock<Vec<EnclaveMeasurement>> = LazyLock::new(|| {'
            echo '    vec!['
            echo "        // === CURRENT: ${TAG} ==="
            echo "        // Built: ${BUILT_AT}"
            echo "        // Artifact digest: sha256:${ARTIFACT_HASH}"
            echo "        // Rekor log index: ${LOG_INDEX}"
            echo "        // Sigstore: https://search.sigstore.dev/?logIndex=${LOG_INDEX}"
            echo "        // GitHub: https://github.com/tinfoilsh/confidential-model-router/releases/tag/${TAG}"
            echo '        EnclaveMeasurement {'
            echo "            snp_measurement: \"${SNP}\".into(),"
            echo '            tdx_measurement: TdxMeasurement {'
            echo "                rtmr1: \"${RTMR1}\".into(),"
            echo "                rtmr2: \"${RTMR2}\".into(),"
            echo '            },'
            echo '        },'

            if [ "${HAS_PREV}" = "true" ]; then
              # Re-emit the captured block with the CURRENT marker rewritten
              # as PREVIOUS, preserving all build comments (Built / Artifact
              # digest / Rekor / Sigstore / GitHub) verbatim.
              printf '%s\n' "${PREV_BLOCK}" \
                | sed 's|// === CURRENT:|// === PREVIOUS:|'
            fi

            echo '    ]'
            echo '});'
          } > "${FILE}"

          echo "Updated ${FILE}:"
          cat "${FILE}"

      - name: Format measurements.rs
        if: steps.check.outputs.changed == 'true'
        run: |
          cargo fmt --manifest-path crates/eidola-server/Cargo.toml

      - name: Check for existing PR
        if: steps.check.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          BRANCH="measurements/${TAG}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Branch ${BRANCH} already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          SNP: ${{ steps.release.outputs.snp }}
          RTMR1: ${{ steps.release.outputs.rtmr1 }}
          RTMR2: ${{ steps.release.outputs.rtmr2 }}
          LOG_INDEX: ${{ steps.sigstore.outputs.log_index }}
        run: |
          BRANCH="measurements/${TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add crates/eidola-server/src/measurements.rs
          git commit -m "Update Tinfoil enclave measurements to ${TAG}"
          git push -u origin "${BRANCH}"

          SHORT_SNP="${SNP:0:16}…${SNP: -16}"
          SHORT_RTMR1="${RTMR1:0:16}…${RTMR1: -16}"
          SHORT_RTMR2="${RTMR2:0:16}…${RTMR2: -16}"
          RELEASE_URL="https://github.com/tinfoilsh/confidential-model-router/releases/tag/${TAG}"
          SIGSTORE_URL="https://search.sigstore.dev/?logIndex=${LOG_INDEX}"

          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Updates the allowed enclave measurements for the Tinfoil inference enclave to match release [\`${TAG}\`](${RELEASE_URL}). Each entry pairs SEV-SNP and TDX measurements per release.

          - **SEV-SNP measurement:** \`${SHORT_SNP}\`
          - **TDX RTMR1:** \`${SHORT_RTMR1}\`
          - **TDX RTMR2:** \`${SHORT_RTMR2}\`
          - **Rekor transparency log:** [${LOG_INDEX}](${SIGSTORE_URL})

          ## Verification

          The measurements were extracted from \`tinfoil-deployment.json\` in the GitHub release.
          The artifact's sigstore attestation was looked up via the GitHub attestation API.

          - [ ] Confirm measurements match [Tinfoil's published values](${RELEASE_URL})
          - [ ] CI passes
          EOF

          gh pr create \
            --title "Update Tinfoil enclave measurements to ${TAG}" \
            --body-file /tmp/pr-body.md \
            --base main
