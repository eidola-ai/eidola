name: Enforce Branching Strategy

# Enforces that the only PRs allowed into `main` are promotion PRs from this
# repo's `next` branch. For any other PR opened against `main`, it retargets the
# base onto `next` (feature work integrates there; `main` only advances by
# fast-forward from `next` once the full `Build & Verify Artifacts` chain passes — see AGENTS.md
# "Branch flow") AND fails, so it can be made a *required check* on `main`: a PR
# that somehow stays on `main` without `next` as its head is blocked from
# merging.
#
# Uses `pull_request_target` so the token can edit the base branch even for PRs
# from forks. Safe here because the job never checks out or executes any
# PR-controlled code — it only calls the GitHub API to move the base and comment.
on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] -- no checkout/exec of PR code; only edits the PR base + comments via API
    types: [opened, reopened, synchronize, edited]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  base-guard:
    name: Base must be next
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: write # edit the PR base branch and post an explanatory comment
    steps:
      - name: Require this repo's next as the only source for main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          # A valid promotion PR is this repo's `next` -> `main` (same-repo, so a
          # fork branch coincidentally named `next` does not qualify).
          if [ "$HEAD_REF" = "next" ] && [ "$HEAD_REPO" = "$REPO" ]; then
            echo "✅ Promotion PR: ${REPO}:next -> main."
            exit 0
          fi

          echo "::error::PRs into main must be this repo's 'next' -> 'main' (got head '${HEAD_REPO}:${HEAD_REF}'). Retargeting onto next."
          gh pr edit "$PR" --repo "$REPO" --base next \
            && gh pr comment "$PR" --repo "$REPO" --body \
            $'👋 This PR targeted `main`, but feature work integrates on `next`. I\'ve retargeted it to `next`.\n\n**The red `Base must be next` check can be ignored.** It stays red by design on any PR that didn\'t originate from `next`. It is not a required check on `next`, so it does not block this PR.' \
            || echo "::warning::could not retarget automatically — resolve the base manually"

          # Fail even though the retarget above (probably) succeeded. Do NOT be
          # tempted to exit 0 once the base reads as `next`: this job's success
          # conclusion IS the required check that gates merges into `main`, and
          # GitHub records it against the PR's *head SHA*, not its base. A green
          # here would persist on that SHA after we move the base to `next`, and
          # an attacker could then flip the base back to `main` and merge in the
          # window before a fresh guard run retargets again — reusing this green
          # plus the expensive `main` checks that already ran on the same SHA from
          # the original `opened` event (those don't re-run on a base `edited`
          # event, and cancel-in-progress concurrency only helps the attacker
          # cancel the corrective run). So the ONLY path to success is the genuine
          # `next` -> `main` promotion PR handled at the top; every other head
          # stays red. The red is cosmetic on `next` (this check is not required
          # there) but load-bearing on `main`.
          exit 1
