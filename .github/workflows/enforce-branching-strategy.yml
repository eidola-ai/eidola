name: Enforce Branching Strategy

# Convenience retargeting: any PR opened against `main` that isn't this repo's
# `next` -> `main` promotion PR is moved onto `next`, where feature work
# integrates (`main` only advances by fast-forward from `next` once the full
# `Build & Verify Artifacts` chain passes — see AGENTS.md "Branch flow").
#
# This workflow is NOT the merge gate. Blocking a non-`next` source from merging
# into `main` is enforced by the `Guard` job in `artifacts.yml` (Build & Verify
# Artifacts), the required check on `main`: it fails fast (red) for any non-`next`
# head and is never green for an invalid head, so there is no success status to
# reuse (the concern that previously forced this job to stay red — see PR #151).
# Because the gate lives there, this job simply ensures the base is `next` and
# returns success; it fails only if it cannot retarget.
#
# Uses `pull_request_target` so the token can edit the base branch even for PRs
# from forks. Safe here because the job never checks out or executes any
# PR-controlled code — it only calls the GitHub API to move the base and comment.
on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] -- no checkout/exec of PR code; only edits the PR base + comments via API
    types: [opened, reopened, synchronize, edited]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  retarget:
    name: Retarget onto next
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: write # edit the PR base branch and post an explanatory comment
    steps:
      - name: Ensure base is this repo's next
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          # The genuine promotion PR is this repo's `next` -> `main` (same-repo, so
          # a fork branch coincidentally named `next` does not qualify). Leave its
          # base on `main`.
          if [ "$HEAD_REF" = "next" ] && [ "$HEAD_REPO" = "$REPO" ]; then
            echo "✅ Promotion PR: ${REPO}:next -> main."
            exit 0
          fi

          # Any other PR: retarget onto `next`. The merge gate for `main` is the
          # `Guard` job in artifacts.yml — never green for a non-`next` head — so
          # this is a convenience, not a block. Return success once the base is
          # `next`; fail only if the base could not be moved.
          echo "PR head '${HEAD_REPO}:${HEAD_REF}' is not this repo's next; retargeting onto next."
          if ! gh pr edit "$PR" --repo "$REPO" --base next; then
            echo "::error::Could not retarget PR #${PR} onto next. Resolve the base manually."
            exit 1
          fi

          gh pr comment "$PR" --repo "$REPO" --body \
            $'👋 This PR targeted `main`, but feature work integrates on `next`, so I\'ve retargeted it. `main` only advances by fast-forward from `next` once the full `Build & Verify Artifacts` chain passes (see AGENTS.md "Branch flow").' \
            || echo "::warning::could not post retarget comment"

          # Confirm the base actually moved before reporting success.
          BASE_REF=$(gh pr view "$PR" --repo "$REPO" --json baseRefName --jq .baseRefName)
          if [ "$BASE_REF" != "next" ]; then
            echo "::error::Expected base 'next' after retarget but got '${BASE_REF}'. Resolve the base manually."
            exit 1
          fi
          echo "✅ Base is now 'next'."
