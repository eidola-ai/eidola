# Tinfoil Container configuration for eidola-server.
#
# The SHA-256 of this file is embedded in the kernel command line and bound
# into the enclave measurement. Any change — image digest, secret hash,
# resource allocation — produces a different measurement.
#
# Image digests below must match artifact-manifest.json.  After building,
# run `just update-manifest` to stamp in the current digests and recompute
# the enclave measurement.
#
# Secret hashes are generated with:
#   cargo run -p hash-secret -- "<secret>"
# and verified at server startup via verify_measured_secrets().

cvm-version: 0.7.3
cpus: 2
memory: 8192

containers:
  - name: "eidola-server"
    image: "ghcr.io/eidola-ai/eidola-server@sha256:679f90b0af47d799a42d71dde9487be34eba554690befe55027aa608bc2333b0"
    devices:
      - /dev/sev-guest
    secrets:
      - CREDENTIAL_MASTER_KEY
      - DATABASE_PASSWORD
      - OTEL_EXPORTER_OTLP_HEADERS
      - STRIPE_API_KEY
      - STRIPE_WEBHOOK_SECRET
      - TINFOIL_API_KEY
    env:
      - BIND_ADDR: "0.0.0.0:8080"
      - OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp-gateway-prod-us-west-0.grafana.net/otlp"
      - DATABASE_URL: "postgresql://gateway@ep-little-bar-akwznszs.c-3.us-west-2.aws.neon.tech/eidola?sslmode=require&channel_binding=disable"

      # Measured secret hashes — Argon2id hashes of the actual secrets.
      - CREDENTIAL_MASTER_KEY_HASH: "$argon2id$v=19$m=19456,t=2,p=1$QA6ZPLR29CAPeushQ+ujFA$cOkF1JJdZoKDDzei5pyDrcsfiDBCuqUDoJaYwXG1G5k"
      - DATABASE_PASSWORD_HASH: "$argon2id$v=19$m=19456,t=2,p=1$cysXhP6SVPuB83IC4iD4yw$ygvRvdmSVfH5zq5+8P/Fgnyz6q93VwCuiZxU0GfjtLs"
      - OTEL_EXPORTER_OTLP_HEADERS_HASH: "$argon2id$v=19$m=19456,t=2,p=1$BU7g3wAtS+gxm9ADqglQrw$KPSjwJlNFppw1/JncRV9Oby1BCNc/53TRPdBv0j3uOw"
      - STRIPE_API_KEY_HASH: "$argon2id$v=19$m=19456,t=2,p=1$qucRiGbS8rYcqJINDlHDcw$qdu/tD4Ymq1by0uPVawIFFneCq757OzZ3/5EPeyFQ4Q"
      - STRIPE_WEBHOOK_SECRET_HASH: "$argon2id$v=19$m=19456,t=2,p=1$4j33RHeU39z3dQiVU/k2rw$NryykMC9uwJGIQYLG5WeYkP3FHD/Sb8uPlAS2qzsLDc"
      - TINFOIL_API_KEY_HASH: "$argon2id$v=19$m=19456,t=2,p=1$d8t7z4mWAjPzjoANx9fJFQ$+kN/8qNToSPgq7GIknW7PTCF38asH6vs1v9eegE1RbQ"

shim:
  upstream-port: 8080
  paths:
    - /*
